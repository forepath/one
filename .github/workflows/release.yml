          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: 'bb6467b6-ebe9-4f90-91f9-2a785f95441e'
          projectname: 'decabill-frontend-landingpage'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/decabill-frontend-landingpage.cdx.json'

      - name: Report DependencyTrack upload outcomes
        if: always()
        run: |
          {
            echo "## DependencyTrack SBOM uploads"
            echo ""
            echo "| Project | Outcome |"
            echo "|---------|---------|"
            echo "| agenstra-frontend-agent-console | ${{ steps.upload-sbom-agenstra-frontend-agent-console.outcome }} |"
            echo "| agenstra-backend-agent-controller | ${{ steps.upload-sbom-agenstra-backend-agent-controller.outcome }} |"
            echo "| agenstra-backend-agent-manager | ${{ steps.upload-sbom-agenstra-backend-agent-manager.outcome }} |"
            echo "| decabill-frontend-billing-console | ${{ steps.upload-sbom-decabill-frontend-billing-console.outcome }} |"
            echo "| decabill-backend-billing-manager | ${{ steps.upload-sbom-decabill-backend-billing-manager.outcome }} |"
            echo "| agenstra-native-agent-console | ${{ steps.upload-sbom-agenstra-native-agent-console.outcome }} |"
            echo "| agenstra-frontend-docs | ${{ steps.upload-sbom-agenstra-frontend-docs.outcome }} |"
            echo "| decabill-frontend-docs | ${{ steps.upload-sbom-decabill-frontend-docs.outcome }} |"
            echo "| shared-mcp-devkit | ${{ steps.upload-sbom-shared-mcp-devkit.outcome }} |"
            echo "| shared-mcp-proxy | ${{ steps.upload-sbom-shared-mcp-proxy.outcome }} |"
            echo "| agenstra-frontend-landingpage | ${{ steps.upload-sbom-agenstra-frontend-landingpage.outcome }} |"
            echo "| decabill-frontend-landingpage | ${{ steps.upload-sbom-decabill-frontend-landingpage.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          failed=0
          for outcome in \
            "${{ steps.upload-sbom-agenstra-frontend-agent-console.outcome }}" \
            "${{ steps.upload-sbom-agenstra-backend-agent-controller.outcome }}" \
            "${{ steps.upload-sbom-agenstra-backend-agent-manager.outcome }}" \
            "${{ steps.upload-sbom-decabill-frontend-billing-console.outcome }}" \
            "${{ steps.upload-sbom-decabill-backend-billing-manager.outcome }}" \
            "${{ steps.upload-sbom-agenstra-native-agent-console.outcome }}" \
            "${{ steps.upload-sbom-agenstra-frontend-docs.outcome }}" \
            "${{ steps.upload-sbom-decabill-frontend-docs.outcome }}" \
            "${{ steps.upload-sbom-shared-mcp-devkit.outcome }}" \
            "${{ steps.upload-sbom-shared-mcp-proxy.outcome }}" \
            "${{ steps.upload-sbom-agenstra-frontend-landingpage.outcome }}" \
            "${{ steps.upload-sbom-decabill-frontend-landingpage.outcome }}"
          do
            if [ "$outcome" = "failure" ]; then
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::warning::One or more DependencyTrack SBOM uploads failed (see table above)"
          fi

      - name: Upload agenstra SBOMs to Cloudflare R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.AGENSTRA_CLOUDFLARE_R2_ENDPOINT }}
          AGENSTRA_AWS_BUCKET: ${{ secrets.AGENSTRA_AWS_BUCKET }}
        run: |
          chmod +x tools/ci/upload-release-sboms-by-domain.sh
          if [ -z "${AGENSTRA_AWS_BUCKET}" ]; then
            echo "::error::AGENSTRA_AWS_BUCKET must be configured"
            exit 1
          fi
          tools/ci/upload-release-sboms-by-domain.sh agenstra dist/sboms \
            "${{ needs.publish.outputs.new_release_version }}" \
            "${AGENSTRA_AWS_BUCKET}" \
            "${CLOUDFLARE_R2_ENDPOINT}"

      - name: Upload decabill SBOMs to Cloudflare R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.DECABILL_CLOUDFLARE_R2_ENDPOINT }}
          DECABILL_AWS_BUCKET: ${{ secrets.DECABILL_AWS_BUCKET }}
        run: |
          chmod +x tools/ci/upload-release-sboms-by-domain.sh
          if [ -z "${DECABILL_AWS_BUCKET}" ]; then
            echo "::error::DECABILL_AWS_BUCKET must be configured"
            exit 1
          fi
          tools/ci/upload-release-sboms-by-domain.sh decabill dist/sboms \
            "${{ needs.publish.outputs.new_release_version }}" \
            "${DECABILL_AWS_BUCKET}" \
            "${CLOUDFLARE_R2_ENDPOINT}"

  prepare-container-image-sbom-uploads:
    name: Prepare container image SBOM uploads
    runs-on: ubuntu-latest
    needs:
      - publish
      - build-api-container-images
      - build-worker-container-images
      - build-vnc-container-images
      - build-ssh-container-images
      - build-agi-container-images
      - build-server-container-images
    if: needs.publish.outputs.new_release_published == 'true'
    env:
      CONTAINER_IMAGE_SBOM_PARENT: '91975f2d-c1cc-4f83-a7fd-07088430423c'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_entries: ${{ steps.set-matrix.outputs.has_entries }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Download container image SBOM artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: sbom-container-images-*
          merge-multiple: true
          path: container-sbom-download

      - name: Collect container image SBOM files
        run: |
          mkdir -p dist/sboms
          if [ -d container-sbom-download ]; then
            find container-sbom-download -type f -name 'container-*.cdx.json' -exec cp -n {} dist/sboms/ \;
          fi

      - name: Build upload matrix
        id: set-matrix
        env:
          PROJECT_VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          chmod +x tools/ci/container-image-sbom-upload-matrix.sh
          matrix="$(tools/ci/container-image-sbom-upload-matrix.sh dist/sboms "$PROJECT_VERSION")"
          {
            echo 'matrix<<EOF'
            printf '%s\n' "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          count="$(printf '%s' "$matrix" | jq '.include | length')"
          if [ "$count" -gt 0 ]; then
            echo "has_entries=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_entries=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload container image SBOM artifact
        if: steps.set-matrix.outputs.has_entries == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: container-image-sboms-for-dt
          path: dist/sboms/container-*.cdx.json
          retention-days: 1
          if-no-files-found: error

  publish-container-image-sboms:
    name: Publish container image SBOM (${{ matrix.projectname }})
    runs-on: ubuntu-latest
    needs:
      - prepare-container-image-sbom-uploads
      - publish
    if: >-
      needs.publish.outputs.new_release_published == 'true' &&
      needs.prepare-container-image-sbom-uploads.outputs.has_entries == 'true'
    environment: production
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-container-image-sbom-uploads.outputs.matrix) }}
    steps:
      - name: Download container image SBOMs
        uses: actions/download-artifact@v8
        with:
          name: container-image-sboms-for-dt
          path: .

      - name: Upload container image SBOM
        uses: forepath/gh-upload-sbom@v2
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: ${{ matrix.parent }}
          projectname: ${{ matrix.projectname }}
          projectversion: ${{ matrix.projectversion }}
          autocreate: true
          bomfilename: ${{ matrix.bomfilename }}
