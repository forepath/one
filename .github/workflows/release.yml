name: Release

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: write
    outputs:
      new_release_published: ${{ steps.semantic-release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Generate token
        id: generate-token
        uses: forepath/github-app-token@v2
        with:
          app_id: ${{ secrets.SEMANTIC_RELEASE_APP_ID }}
          private_key: ${{ secrets.SEMANTIC_RELEASE_KEY_PEM }}

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v6
        id: semantic-release
        with:
          semantic_version: 22.0.5
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            conventional-changelog-conventionalcommits@7.0.2
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Run build
        if: steps.semantic-release.outputs.new_release_published == 'true'
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npx nx run-many --target=build --configuration=production --parallel=3; then
              exit 0
            fi
            echo "Build attempt ${attempt} failed."
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep 10
          done

      - name: Generate binaries
        if: steps.semantic-release.outputs.new_release_published == 'true'
        run: npx nx run-many --target=scripts-binary --parallel=3

      - name: Run SBOM generation
        if: steps.semantic-release.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.semantic-release.outputs.new_release_version }}
        run: npx nx run-many --target=sbom --parallel=1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: steps.semantic-release.outputs.new_release_published == 'true'
        with:
          name: build-artifacts
          path: |
            dist/
            node_modules/
          retention-days: 1
          compression-level: 6

  build-api-container-images:
    name: Build API Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish API container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=api-container-image --configuration=release --parallel=3

      - name: Generate container image SBOMs
        uses: ./.github/actions/generate-container-image-sboms
        with:
          project-version: ${{ needs.publish.outputs.new_release_version }}
          artifact-name: sbom-container-images-api

  build-worker-container-images:
    name: Build Worker Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Worker container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=worker-container-image --configuration=release --parallel=3

      - name: Generate container image SBOMs
        uses: ./.github/actions/generate-container-image-sboms
        with:
          project-version: ${{ needs.publish.outputs.new_release_version }}
          artifact-name: sbom-container-images-worker

  build-vnc-container-images:
    name: Build VNC Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish VNC container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=vnc-container-image --configuration=release --parallel=3

      - name: Generate container image SBOMs
        uses: ./.github/actions/generate-container-image-sboms
        with:
          project-version: ${{ needs.publish.outputs.new_release_version }}
          artifact-name: sbom-container-images-vnc

  build-ssh-container-images:
    name: Build SSH Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish SSH container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=ssh-container-image --configuration=release --parallel=3

      - name: Generate container image SBOMs
        uses: ./.github/actions/generate-container-image-sboms
        with:
          project-version: ${{ needs.publish.outputs.new_release_version }}
          artifact-name: sbom-container-images-ssh

  build-agi-container-images:
    name: Build AGI Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish AGI container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=agi-container-image --configuration=release --parallel=3

      - name: Generate container image SBOMs
        uses: ./.github/actions/generate-container-image-sboms
        with:
          project-version: ${{ needs.publish.outputs.new_release_version }}
          artifact-name: sbom-container-images-agi

  build-server-container-images:
    name: Build Server Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Server container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=server-container-image --configuration=release --parallel=3

      - name: Generate container image SBOMs
        uses: ./.github/actions/generate-container-image-sboms
        with:
          project-version: ${{ needs.publish.outputs.new_release_version }}
          artifact-name: sbom-container-images-server

  publish-openapi-clients-js:
    name: Publish OpenAPI JavaScript/TypeScript Clients
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Configure npm for GitHub Packages
        run: |
          echo "@forepath:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install OpenAPI Generator CLI
        run: |
          npm install --ignore-scripts=false @openapitools/openapi-generator-cli
          npx @openapitools/openapi-generator-cli version

      - name: Publish JavaScript/TypeScript clients
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=openapi-client-js --configuration=release --parallel=3

  build-native-applications-linux:
    name: Publish Linux Applications
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build binaries
        env:
          ELECTRON_FORGE_PLATFORM: linux
          RELEASE_VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          xvfb-run -a npx nx run-many --target=package --configuration=production-linux --parallel=3

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary-artifacts-linux
          path: |
            dist/**/out/make/**/*.zip
            dist/**/out/make/**/*.deb
            dist/**/out/make/**/*.rpm
          retention-days: 1
          compression-level: 6

  build-native-applications-windows:
    name: Publish Windows Applications
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    outputs:
      has_windows_bundle: ${{ steps.detect-windows-bundle.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Setup Windows build environment
        uses: ./.github/actions/setup-windows-build-env

      - name: Build binaries
        env:
          ELECTRON_FORGE_PLATFORM: win32
          RELEASE_VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          xvfb-run -a npx nx run-many --target=package --configuration=production-windows --parallel=3

      - name: Upload Windows Electron bundle
        uses: actions/upload-artifact@v7
        with:
          name: windows-electron-bundle
          path: dist/apps/agenstra/native-agent-console/out/native-agent-console-win32-x64
          if-no-files-found: error
          retention-days: 1

      - name: Upload Windows zip artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary-artifacts-windows
          path: dist/**/out/make/**/win32/**/*.zip
          if-no-files-found: ignore
          retention-days: 1
          compression-level: 6

      - name: Detect Windows Electron bundle
        id: detect-windows-bundle
        if: ${{ !cancelled() }}
        run: |
          bundle_path="dist/apps/agenstra/native-agent-console/out/native-agent-console-win32-x64"
          if [ -d "$bundle_path" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-native-applications-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs:
      - publish
      - build-native-applications-windows
    if: >-
      needs.publish.outputs.new_release_published == 'true' &&
      needs.build-native-applications-windows.outputs.has_windows_bundle == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Download Windows Electron bundle
        uses: actions/download-artifact@v8
        with:
          name: windows-electron-bundle
          path: windows-electron-bundle

      - name: Build NSIS installer from prepackaged bundle
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.publish.outputs.new_release_version }}
          REQUIRE_INSTALLER_BUNDLE: '1'
        run: ./tools/ci/build-windows-installer.ps1

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary-artifacts-windows-installer
          path: apps/agenstra/native-agent-console/installer-out/*.exe
          if-no-files-found: ignore
          retention-days: 1
          compression-level: 6

  publish-native-applications:
    name: Publish Native Applications
    runs-on: ubuntu-latest
    needs:
      - publish
      - build-native-applications-linux
      - build-native-applications-windows
      - build-native-applications-windows-installer
    if: needs.publish.outputs.new_release_published == 'true'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v5

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binary-artifacts-*
          merge-multiple: true

      - name: Consolidate binaries
        run: |
          mkdir -p release
          mkdir -p artifacts
          find artifacts -type f -name '*.zip' -exec cp {} release/ \;
          find artifacts -type f -name '*.deb' -exec cp {} release/ \;
          find artifacts -type f -name '*.rpm' -exec cp {} release/ \;
          find artifacts -type f -name '*.exe' -exec cp {} release/ \;
          find artifacts -type f -name '*.msi' -exec cp {} release/ \;
          find artifacts -type f -name '*.msix' -exec cp {} release/ \;

      - name: Generate desktop integrity manifests (SHA256SUMS + integrity-manifest.json)
        run: |
          shopt -s nullglob
          files=(release/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No desktop binaries in release/; skipping integrity manifests."
            exit 0
          fi
          npx nx run release-integrity:build
          node tools/release-integrity/dist/src/cli.js --input release
          node tools/release-integrity/dist/src/cli.js verify --input release

      - name: Upload binaries to Cloudflare R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.AGENSTRA_CLOUDFLARE_R2_ENDPOINT }}
          AGENSTRA_AWS_BUCKET: ${{ secrets.AGENSTRA_AWS_BUCKET }}
        run: |
          shopt -s nullglob
          files=(release/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No desktop binaries in release/ — aborting R2 upload"
            exit 1
          fi
          if [ -z "${AGENSTRA_AWS_BUCKET}" ]; then
            echo "::error::AGENSTRA_AWS_BUCKET must be configured"
            exit 1
          fi
          aws s3 cp release/ "s3://${AGENSTRA_AWS_BUCKET}/releases/${{ needs.publish.outputs.new_release_version }}/desktop/" --recursive --endpoint-url "${CLOUDFLARE_R2_ENDPOINT}"

  publish-agentctx:
    name: Publish agentctx to Cloudflare R2
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Upload agentctx to Cloudflare R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.AGENSTRA_CLOUDFLARE_R2_ENDPOINT }}
          AGENSTRA_AWS_BUCKET: ${{ secrets.AGENSTRA_AWS_BUCKET }}
        run: |
          if [ -z "${AGENSTRA_AWS_BUCKET}" ]; then
            echo "::error::AGENSTRA_AWS_BUCKET must be configured"
            exit 1
          fi
          aws s3 cp dist/tools/ai/bin/ "s3://${AGENSTRA_AWS_BUCKET}/releases/${{ needs.publish.outputs.new_release_version }}/agentctx/" --recursive --endpoint-url "${CLOUDFLARE_R2_ENDPOINT}"
          aws s3 cp dist/tools/ai/bin/ "s3://${AGENSTRA_AWS_BUCKET}/agentctx/" --recursive --endpoint-url "${CLOUDFLARE_R2_ENDPOINT}"

  publish-sboms:
    name: Publish SBOMs to DependencyTrack
    runs-on: ubuntu-latest
    needs:
      - publish
      - build-api-container-images
      - build-worker-container-images
      - build-vnc-container-images
      - build-ssh-container-images
      - build-agi-container-images
      - build-server-container-images
    if: needs.publish.outputs.new_release_published == 'true'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: .

      - name: Download container image SBOM artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: sbom-container-images-*
          merge-multiple: true
          path: container-sbom-download

      - name: Merge container image SBOM files
        run: |
          mkdir -p dist/sboms
          if [ -d container-sbom-download ]; then
            find container-sbom-download -type f -name 'container-*.cdx.json' -exec cp -n {} dist/sboms/ \;
          fi

      - name: Upload agenstra-frontend-agent-console SBOM
        id: upload-sbom-agenstra-frontend-agent-console
        uses: forepath/gh-upload-sbom@v2
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '91161848-3734-4339-a504-bf08853348b1'
          projectname: 'agenstra-frontend-agent-console'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/agenstra-frontend-agent-console.cdx.json'

      - name: Upload agenstra-backend-agent-controller SBOM
        id: upload-sbom-agenstra-backend-agent-controller
        uses: forepath/gh-upload-sbom@v2
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: 'fab6501b-b798-4e62-91b9-4bb1c5c175c1'
          projectname: 'agenstra-backend-agent-controller'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/agenstra-backend-agent-controller.cdx.json'

      - name: Upload agenstra-backend-agent-manager SBOM
        id: upload-sbom-agenstra-backend-agent-manager
        uses: forepath/gh-upload-sbom@v2
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '7d399337-2c6e-408e-8f1f-5f0344af1d08'
          projectname: 'agenstra-backend-agent-manager'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/agenstra-backend-agent-manager.cdx.json'

      - name: Upload decabill-frontend-billing-console SBOM
        id: upload-sbom-decabill-frontend-billing-console
        uses: forepath/gh-upload-sbom@v2
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '6c94f662-28c5-4317-93aa-415bdbccc3ce'
          projectname: 'decabill-frontend-billing-console'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/decabill-frontend-billing-console.cdx.json'

      - name: Upload decabill-backend-billing-manager SBOM
        id: upload-sbom-decabill-backend-billing-manager
        uses: forepath/gh-upload-sbom@v2
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '9cc09622-15b6-4dbf-a639-42288ffaa6a4'
          projectname: 'decabill-backend-billing-manager'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/decabill-backend-billing-manager.cdx.json'

      - name: Upload agenstra-native-agent-console SBOM
        id: upload-sbom-agenstra-native-agent-console
        uses: forepath/gh-upload-sbom@v2
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
