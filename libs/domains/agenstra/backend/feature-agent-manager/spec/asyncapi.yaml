                    type: number
                    description: Number of processes
                  storage_stats:
                    type: object
                    description: Storage statistics
                  cpu_stats:
                    type: object
                    description: CPU usage statistics
                  precpu_stats:
                    type: object
                    description: Previous CPU statistics
                  memory_stats:
                    type: object
                    description: Memory usage statistics
                  networks:
                    type: object
                    description: Network statistics
              timestamp:
                type: string
