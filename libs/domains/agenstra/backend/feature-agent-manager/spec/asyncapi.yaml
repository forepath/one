    ContainerStats:
      name: ContainerStats
      title: Container stats event
      contentType: application/json
      payload:
        type: object
        required: [success, data, timestamp]
        properties:
          success:
            type: boolean
            enum: [true]
          data:
            type: object
            required: [status, timestamp]
            properties:
              status:
                type: object
                required: [running]
                description: General container run status.
                properties:
                  running:
                    type: boolean
                    description: true if the container is started, false if stopped.
              stats:
                type: object
                nullable: true
                description: Docker container statistics (CPU, memory, network, etc.). Present when container is running, null when stopped. See Docker API documentation for full structure.
                properties:
                  read:
                    type: string
                    description: Timestamp when stats were read
                  preread:
                    type: string
                    description: Previous read timestamp
                  pids_stats:
                    type: object
