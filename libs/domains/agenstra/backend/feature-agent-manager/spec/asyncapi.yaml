asyncapi: 3.0.0
info:
  title: Agent Gateway
  version: 1.0.0
  description: |
    WebSocket events for the agents chat gateway. Socket.IO namespace from env `WEBSOCKET_NAMESPACE` (default `agents`);
    listen port from env `WEBSOCKET_PORT` (default 8080). CORS for the gateway from `WEBSOCKET_CORS_ORIGIN` (default `*`).
    Connection state recovery uses `SOCKET_MAX_DISCONNECTION_DURATION` ms (default 120000) per NestJS `connectionStateRecovery`.
    The REST API runs on a separate HTTP port (`PORT`, default 3000); see the Agent Manager OpenAPI spec.
servers:
  local:
    host: localhost:8080
    protocol: ws
    description: |
      Socket.IO server; path `/socket.io` with namespace `/agents` (e.g. `ws://localhost:8080/agents` depending on client).
      Port defaults to 8080 unless `WEBSOCKET_PORT` is set.
channels:
  agents/login:
    address: agents/login
    messages:
      loginCommand:
        $ref: '#/components/messages/Login'
    description: Client sends login command with credentials (agentId or name + password)
  agents/loginSuccess:
    address: agents/loginSuccess
    messages:
      loginSuccessEvent:
        $ref: '#/components/messages/LoginSuccess'
    description: Server acknowledges successful login. After this event, chat history is automatically restored via chatMessage events.
  agents/loginError:
    address: agents/loginError
    messages:
      loginErrorEvent:
        $ref: '#/components/messages/LoginError'
    description: Server returns login failure reason
  agents/chat:
    address: agents/chat
    messages:
      chatCommand:
        $ref: '#/components/messages/Chat'
    description: |
      Client sends a chat message (requires prior login). Payload may include `responseMode` "single" | "stream" | "sync",
      `ephemeral` (skip `agent_messages` persistence for the turn), `continue`, `resumeSessionSuffix`, `correlationId`, `model`.
      When `ephemeral` is true, `chatMessage`, `chatEvent`, and `messageFilterResult` for that turn are emitted only to the
      requesting socket (not broadcast to other clients on the same agent). Otherwise those events are broadcast to every
      socket authenticated to the agent. The gateway forwards options to `sendMessage` as implemented in code.
  agents/enhanceChat:
    address: agents/enhanceChat
    messages:
      enhanceChatCommand:
        $ref: '#/components/messages/EnhanceChat'
    description: >
      Client requests prompt improvement in an isolated session (requires prior login).
      Does not persist to agent chat history or broadcast chatMessage. Result is emitted only to the requesting socket as chatEnhanceResult.
  agents/chatEnhanceResult:
    address: agents/chatEnhanceResult
    messages:
      chatEnhanceResultEvent:
        $ref: '#/components/messages/ChatEnhanceResult'
    description: Unicast success envelope; data.success true with enhancedText, or data.success false with error (still success true on outer envelope)
  agents/generateTicketBody:
    address: agents/generateTicketBody
    messages:
      generateTicketBodyCommand:
        $ref: '#/components/messages/GenerateTicketBody'
    description: >
      Client requests ticket body text from a title in an isolated session (requires prior login).
      Does not persist to agent chat history. Result is emitted only to the requesting socket as ticketBodyResult (same payload shape as chatEnhanceResult).
  agents/ticketBodyResult:
    address: agents/ticketBodyResult
    messages:
      ticketBodyResultEvent:
        $ref: '#/components/messages/TicketBodyResult'
    description: Unicast result for generateTicketBody; same envelope as ChatEnhanceResult (enhancedText holds generated body).
  agents/chatMessage:
    address: agents/chatMessage
    messages:
      chatBroadcast:
        $ref: '#/components/messages/ChatMessage'
    description: |
      Emits standardized chat line envelopes (`success` + `data` + `timestamp`). Normally broadcast to all clients
      authenticated to the same agent; for a `chat` request with `ephemeral: true`, user/agent lines for that turn are
      unicast to the requesting socket only. After successful login, chat history is replayed as `chatMessage` events in
      chronological order to the authenticating client only.
  agents/chatEvent:
    address: agents/chatEvent
    messages:
      chatEventBroadcast:
        $ref: '#/components/messages/ChatEvent'
    description: >
      Structured chat events (streaming deltas, tool calls/results, questions, final assistant messages). Normally broadcast
      to all clients authenticated to the same agent; for an ephemeral chat turn, events for that turn are emitted only to
      the requesting socket. Additive; does not replace chatMessage.
  agents/messageFilterResult:
    address: agents/messageFilterResult
    messages:
      messageFilterResultEvent:
        $ref: '#/components/messages/MessageFilterResult'
    description: >
      Filter outcome for incoming or outgoing messages. Follows the same broadcast vs ephemeral unicast rules as chatMessage:
      when the related `chat` request had `ephemeral: true`, results for that turn go only to the requesting socket.
  agents/error:
    address: agents/error
    messages:
      errorEvent:
        $ref: '#/components/messages/Error'
    description: Generic error messages for unauthorized or processing failures
  agents/fileUpdate:
    address: agents/fileUpdate
    messages:
      fileUpdateCommand:
        $ref: '#/components/messages/FileUpdate'
    description: Client sends file update notification (requires prior login). Broadcasts to all clients authenticated to the same agent.
  agents/fileUpdateNotification:
    address: agents/fileUpdateNotification
    messages:
      fileUpdateNotificationEvent:
        $ref: '#/components/messages/FileUpdateNotification'
    description: Server broadcasts file update notifications to all clients authenticated to the same agent. Includes socket ID to identify the source of the update.
  agents/logout:
    address: agents/logout
    messages:
      logoutCommand:
        $ref: '#/components/messages/Logout'
    description: Client sends logout command to end authenticated session
  agents/logoutSuccess:
    address: agents/logoutSuccess
    messages:
      logoutSuccessEvent:
        $ref: '#/components/messages/LogoutSuccess'
    description: Server acknowledges successful logout
  agents/createTerminal:
    address: agents/createTerminal
    messages:
      createTerminalCommand:
        $ref: '#/components/messages/CreateTerminal'
    description: Client sends create terminal command (requires prior login). Creates a new TTY session for the agent's container.
  agents/terminalCreated:
    address: agents/terminalCreated
    messages:
      terminalCreatedEvent:
        $ref: '#/components/messages/TerminalCreated'
    description: Server acknowledges successful terminal creation. Terminal session is client-specific (socket.id based).
  agents/terminalInput:
    address: agents/terminalInput
    messages:
      terminalInputCommand:
        $ref: '#/components/messages/TerminalInput'
    description: Client sends input data to a terminal session (requires prior login). Only the socket that created the session can send input.
  agents/terminalOutput:
    address: agents/terminalOutput
    messages:
      terminalOutputEvent:
        $ref: '#/components/messages/TerminalOutput'
    description: Server sends terminal output data to the client. Emitted whenever the terminal session produces output.
  agents/closeTerminal:
    address: agents/closeTerminal
    messages:
      closeTerminalCommand:
        $ref: '#/components/messages/CloseTerminal'
    description: Client sends close terminal command (requires prior login). Only the socket that created the session can close it.
  agents/terminalClosed:
    address: agents/terminalClosed
    messages:
      terminalClosedEvent:
        $ref: '#/components/messages/TerminalClosed'
    description: Server acknowledges terminal closure. Also emitted when terminal session ends (e.g., exit command).
  agents/containerStats:
    address: agents/containerStats
    messages:
      containerStatsEvent:
        $ref: '#/components/messages/ContainerStats'
    description: Server broadcasts container status (running/stopped) and, when running, container statistics (CPU, memory, network, etc.) periodically to all clients authenticated to the agent. First broadcast is sent immediately after successful login, then every 15 seconds by default (CONTAINER_STATS_SCHEDULER_INTERVAL in milliseconds on the agent-manager) while clients remain authenticated. When the container is stopped, stats is null but status is always present.
operations:
  clientSendsLogin:
    action: send
    channel:
      $ref: '#/channels/agents~1login'
    messages:
      - $ref: '#/channels/agents~1login/messages/loginCommand'
  serverEmitsLoginSuccess:
    action: receive
    channel:
      $ref: '#/channels/agents~1loginSuccess'
    messages:
      - $ref: '#/channels/agents~1loginSuccess/messages/loginSuccessEvent'
  serverEmitsLoginError:
    action: receive
    channel:
      $ref: '#/channels/agents~1loginError'
    messages:
      - $ref: '#/channels/agents~1loginError/messages/loginErrorEvent'
  clientSendsChat:
    action: send
    channel:
      $ref: '#/channels/agents~1chat'
    messages:
      - $ref: '#/channels/agents~1chat/messages/chatCommand'
  clientSendsEnhanceChat:
    action: send
    channel:
      $ref: '#/channels/agents~1enhanceChat'
    messages:
      - $ref: '#/channels/agents~1enhanceChat/messages/enhanceChatCommand'
  serverEmitsChatEnhanceResult:
    action: receive
    channel:
      $ref: '#/channels/agents~1chatEnhanceResult'
    messages:
      - $ref: '#/channels/agents~1chatEnhanceResult/messages/chatEnhanceResultEvent'
  clientSendsGenerateTicketBody:
    action: send
    channel:
      $ref: '#/channels/agents~1generateTicketBody'
    messages:
      - $ref: '#/channels/agents~1generateTicketBody/messages/generateTicketBodyCommand'
  serverEmitsTicketBodyResult:
    action: receive
    channel:
      $ref: '#/channels/agents~1ticketBodyResult'
    messages:
      - $ref: '#/channels/agents~1ticketBodyResult/messages/ticketBodyResultEvent'
  serverBroadcastsChatMessage:
    action: receive
    channel:
      $ref: '#/channels/agents~1chatMessage'
    messages:
      - $ref: '#/channels/agents~1chatMessage/messages/chatBroadcast'
  serverBroadcastsChatEvent:
    action: receive
    channel:
      $ref: '#/channels/agents~1chatEvent'
    messages:
      - $ref: '#/channels/agents~1chatEvent/messages/chatEventBroadcast'
  serverBroadcastsMessageFilterResult:
    action: receive
    channel:
      $ref: '#/channels/agents~1messageFilterResult'
    messages:
      - $ref: '#/channels/agents~1messageFilterResult/messages/messageFilterResultEvent'
  serverEmitsError:
    action: receive
    channel:
      $ref: '#/channels/agents~1error'
    messages:
      - $ref: '#/channels/agents~1error/messages/errorEvent'
  clientSendsFileUpdate:
    action: send
    channel:
      $ref: '#/channels/agents~1fileUpdate'
    messages:
      - $ref: '#/channels/agents~1fileUpdate/messages/fileUpdateCommand'
  serverBroadcastsFileUpdateNotification:
    action: receive
    channel:
      $ref: '#/channels/agents~1fileUpdateNotification'
    messages:
      - $ref: '#/channels/agents~1fileUpdateNotification/messages/fileUpdateNotificationEvent'
  clientSendsLogout:
    action: send
    channel:
      $ref: '#/channels/agents~1logout'
    messages:
      - $ref: '#/channels/agents~1logout/messages/logoutCommand'
  serverEmitsLogoutSuccess:
    action: receive
    channel:
      $ref: '#/channels/agents~1logoutSuccess'
    messages:
      - $ref: '#/channels/agents~1logoutSuccess/messages/logoutSuccessEvent'
  clientSendsCreateTerminal:
    action: send
    channel:
      $ref: '#/channels/agents~1createTerminal'
    messages:
      - $ref: '#/channels/agents~1createTerminal/messages/createTerminalCommand'
  serverEmitsTerminalCreated:
    action: receive
    channel:
      $ref: '#/channels/agents~1terminalCreated'
    messages:
      - $ref: '#/channels/agents~1terminalCreated/messages/terminalCreatedEvent'
  clientSendsTerminalInput:
    action: send
    channel:
      $ref: '#/channels/agents~1terminalInput'
    messages:
      - $ref: '#/channels/agents~1terminalInput/messages/terminalInputCommand'
  serverEmitsTerminalOutput:
    action: receive
    channel:
      $ref: '#/channels/agents~1terminalOutput'
    messages:
      - $ref: '#/channels/agents~1terminalOutput/messages/terminalOutputEvent'
  clientSendsCloseTerminal:
    action: send
    channel:
      $ref: '#/channels/agents~1closeTerminal'
    messages:
      - $ref: '#/channels/agents~1closeTerminal/messages/closeTerminalCommand'
  serverEmitsTerminalClosed:
    action: receive
    channel:
      $ref: '#/channels/agents~1terminalClosed'
    messages:
      - $ref: '#/channels/agents~1terminalClosed/messages/terminalClosedEvent'
  serverBroadcastsContainerStats:
    action: receive
    channel:
      $ref: '#/channels/agents~1containerStats'
    messages:
      - $ref: '#/channels/agents~1containerStats/messages/containerStatsEvent'
components:
  securitySchemes:
    jwt:
      type: httpApiKey
      name: Authorization
      in: header
      description: 'Bearer JWT from Keycloak, e.g. Authorization: Bearer <token>'
  messages:
    Login:
      name: Login
      title: Login command
      contentType: application/json
      payload:
        type: object
        required: [agentId, password]
        properties:
          agentId:
            type: string
            description: Agent UUID or name
          password:
            type: string
    LoginSuccess:
      name: LoginSuccess
      title: Login success event
      contentType: application/json
      payload:
        type: object
        required: [success, data, timestamp]
        properties:
          success:
            type: boolean
            enum: [true]
          data:
            type: object
            required: [message, agentId, agentName]
            properties:
              message:
                type: string
                description: Welcome message
              agentId:
                type: string
                description: Agent UUID
              agentName:
                type: string
                description: Agent name
          timestamp:
            type: string
            description: ISO timestamp
    LoginError:
      name: LoginError
      title: Login error event
      contentType: application/json
      payload:
        type: object
        required: [success, error, timestamp]
        properties:
          success:
            type: boolean
            enum: [false]
          error:
            type: object
            required: [message]
            properties:
              message:
                type: string
                description: Error message
              code:
                type: string
                description: Error code (optional)
                enum: [INVALID_CREDENTIALS, LOGIN_ERROR]
              details:
                type: string
                description: Additional error details (optional)
          timestamp:
            type: string
            description: ISO timestamp
    Chat:
      name: Chat
      title: Chat command
      contentType: application/json
      payload:
        type: object
        required: [message]
        properties:
          message:
            type: string
            description: Message text
          model:
            type: string
            description: Optional model identifier (e.g., gpt-4o) forwarded to the agent container to override the default model for this chat request
          correlationId:
            type: string
            description: Optional client-supplied correlation id for streaming/tool events; if omitted the server will generate one.
          responseMode:
            type: string
            enum: [single, stream, sync]
            description: >
              Optional response mode. "stream" may emit chatEvent deltas before the final chatMessage; "sync" uses a
              non-streaming path suitable for background automation; "single" is the default when omitted.
          ephemeral:
            type: boolean
            description: >
              When true, skips persisting user and assistant messages for this turn and emits chatMessage, chatEvent, and
              messageFilterResult for this turn only to the requesting socket (no fan-out to other viewers on the agent).
          continue:
            type: boolean
            description: Optional continuation flag forwarded to the agent sendMessage flow.
          resumeSessionSuffix:
            type: string
            description: Optional suffix to isolate or resume session routing for this chat turn.
          contextInjection:
            type: object
            description: >
              Optional hidden context references for prompt enrichment. Agent-manager resolves each referenced
              agent's repository/container type server-side when composing the hidden preamble (non-generic types
              only); clients do not send type fields on the wire.
            properties:
              includeWorkspace:
                type: boolean
                description: Include shared workspace context mounted at /opt/workspace.
              environmentIds:
                type: array
                description: Optional related environment ids to reference in hidden preamble.
                items:
                  type: string
              ticketShas:
                type: array
                description: Optional ticket SHA references for prompt enrichment.
                items:
                  type: string
              knowledgeShas:
                type: array
                description: Optional knowledge page/folder SHA references for prompt enrichment.
                items:
                  type: string
              autoEnrichmentEnabled:
                type: boolean
                description: Enable prompt-based automatic enrichment (default true when omitted).
    EnhanceChat:
      name: EnhanceChat
      title: Prompt enhancement command
      contentType: application/json
      payload:
        type: object
        required: [message, correlationId]
        properties:
          message:
            type: string
            description: User draft to improve (same composition as chat input)
          correlationId:
            type: string
            description: Client-generated id echoed in chatEnhanceResult
          model:
            type: string
            description: Optional model override for this request
          contextInjection:
            type: object
            description: >
              Optional hidden context references for prompt enrichment. Agent-manager resolves each referenced
              agent's repository/container type server-side when composing the hidden preamble (non-generic types
              only); clients do not send type fields on the wire.
            properties:
              includeWorkspace:
                type: boolean
              environmentIds:
                type: array
                items:
                  type: string
              ticketShas:
                type: array
                items:
                  type: string
              knowledgeShas:
                type: array
                items:
                  type: string
              autoEnrichmentEnabled:
                type: boolean
    ChatEnhanceResult:
      name: ChatEnhanceResult
      title: Prompt enhancement result (unicast)
      contentType: application/json
      payload:
        type: object
        required: [success, data, timestamp]
        properties:
          success:
            type: boolean
            enum: [true]
          data:
            oneOf:
              - type: object
                required: [correlationId, success, enhancedText]
                properties:
                  correlationId:
                    type: string
                  success:
                    type: boolean
                    enum: [true]
                  enhancedText:
                    type: string
              - type: object
                required: [correlationId, success, error]
                properties:
                  correlationId:
                    type: string
                  success:
                    type: boolean
                    enum: [false]
                  error:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                      code:
                        type: string
                      details:
                        type: string
          timestamp:
            type: string
            description: ISO timestamp
    GenerateTicketBody:
      name: GenerateTicketBody
      title: Generate ticket body from title
      contentType: application/json
      payload:
        type: object
        required: [title, correlationId]
        properties:
          title:
            type: string
            description: Ticket title to expand into body text
          correlationId:
            type: string
            description: Client-generated id echoed in ticketBodyResult
          model:
            type: string
            description: Optional model override for this request
          hierarchyContext:
            type: string
            description: Optional parent chain and subtask tree (plain text) for richer body generation
          contextInjection:
            type: object
            description: >
              Optional hidden context references for prompt enrichment. Agent-manager resolves each referenced
              agent's repository/container type server-side when composing the hidden preamble (non-generic types
              only); clients do not send type fields on the wire.
            properties:
              includeWorkspace:
                type: boolean
              environmentIds:
                type: array
                items:
                  type: string
              ticketShas:
                type: array
                items:
                  type: string
              knowledgeShas:
                type: array
                items:
                  type: string
              autoEnrichmentEnabled:
                type: boolean
    TicketBodyResult:
      name: TicketBodyResult
      title: Ticket body generation result (unicast)
      contentType: application/json
      payload:
        type: object
        required: [success, data, timestamp]
        properties:
          success:
            type: boolean
            enum: [true]
          data:
            oneOf:
              - type: object
                required: [correlationId, success, enhancedText]
                properties:
                  correlationId:
                    type: string
                  success:
                    type: boolean
                    enum: [true]
                  enhancedText:
                    type: string
                    description: Generated ticket body (markdown)
              - type: object
                required: [correlationId, success, error]
                properties:
                  correlationId:
                    type: string
                  success:
                    type: boolean
                    enum: [false]
                  error:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                      code:
                        type: string
                      details:
                        type: string
          timestamp:
            type: string
            description: ISO timestamp
    ChatMessage:
      name: ChatMessage
      title: Chat broadcast event
      contentType: application/json
      payload:
        type: object
        required: [success, data, timestamp]
        properties:
          success:
            type: boolean
            enum: [true]
          data:
            oneOf:
              - type: object
                required: [from, text, timestamp]
                properties:
                  from:
                    type: string
                    enum: [user]
                  text:
                    type: string
                    description: Message text
                  timestamp:
                    type: string
                    description: ISO timestamp
              - type: object
                required: [from, response, timestamp]
                properties:
                  from:
                    type: string
                    enum: [agent]
                  response:
                    oneOf:
                      - type: object
                        properties:
                          type:
                            type: string
                          subtype:
                            type: string
                            description: Agent response subtype
                          is_error:
                            type: boolean
                            description: Whether the agent response is an error. When true and result is "MESSAGE_DROPPED", the message was dropped by a filter.
                          duration_ms:
                            type: number
                            description: Total duration in milliseconds
                          duration_api_ms:
                            type: number
                            description: API call duration in milliseconds
                          result:
                            type: string
                            description: >
                              Agent response result. Can be "MESSAGE_DROPPED" when a message was dropped by a filter
                              (in this case, is_error will be true and message field will contain the filter reason).
                          message:
                            type: string
                            description: >
                              Error message or filter reason. Present when is_error is true, especially when result is "MESSAGE_DROPPED".
                          session_id:
                            type: string
                            description: Session ID
                          request_id:
                            type: string
                            description: Request ID
                        description: >
                          Parsed JSON response object from agent. When a message is dropped by a filter, a fake agent response
                          is created with type: "error", is_error: true, result: "MESSAGE_DROPPED", and message containing the filter reason.
                      - type: string
                        description: Cleaned string response if JSON parsing fails (text before first { and after last } is removed)
                  timestamp:
                    type: string
                    description: ISO timestamp
          timestamp:
            type: string
            description: ISO timestamp
    ChatEvent:
      name: ChatEvent
      title: Structured chat event broadcast
      contentType: application/json
      payload:
        type: object
        required: [success, data, timestamp]
        properties:
          success:
            type: boolean
            enum: [true]
          data:
            type: object
            required:
              [
                eventId,
                agentId,
                correlationId,
                sequence,
                kind,
                payload,
                timestamp,
              ]
            properties:
              eventId:
                type: string
                description: Unique event id (uuid)
              agentId:
                type: string
                description: Agent UUID
              correlationId:
                type: string
                description: Correlates events that belong to a single user request
              sequence:
                type: integer
                minimum: 0
                description: Monotonic sequence number scoped to correlationId
              timestamp:
                type: string
                format: date-time
                description: Event timestamp (ISO)
              kind:
                type: string
                enum:
                  [
                    userMessage,
                    thinking,
                    assistantDelta,
                    assistantMessage,
                    toolCall,
                    toolResult,
                    question,
                    status,
                    error,
                  ]
              payload:
                type: object
                description: Kind-specific payload (see documentation)
          timestamp:
            type: string
            description: ISO timestamp
    MessageFilterResult:
      name: MessageFilterResult
      title: Message filter result event
      contentType: application/json
      payload:
        type: object
        required: [success, data, timestamp]
        properties:
          success:
            type: boolean
            enum: [true]
          data:
            type: object
            required: [direction, status, message, appliedFilters, timestamp]
            properties:
              direction:
                type: string
                enum: [incoming, outgoing]
                description: Filter direction (incoming or outgoing)
              status:
                type: string
                enum: [allowed, filtered, dropped]
                description: Final filter status
              message:
                type: string
                description: Original message that was filtered
              modifiedMessage:
                type: string
                description: >
                  Modified message content (if filter modified the message).
                  Only present when status is "filtered" and action is "flag".
                  If present, this modified message should be used instead of the original message.
              appliedFilters:
                type: array
                description: List of all filters that were applied
                items:
                  type: object
                  required: [type, displayName, matched]
                  properties:
                    type:
                      type: string
                      description: Filter type identifier
                    displayName:
                      type: string
                      description: Filter display name
                    matched:
                      type: boolean
                      description: Whether this filter matched
                    reason:
                      type: string
                      description: Reason if filter matched
              matchedFilter:
                type: object
                description: The filter that matched, if any
                properties:
                  type:
                    type: string
                  displayName:
                    type: string
                  matched:
                    type: boolean
                  reason:
                    type: string
              action:
                type: string
                enum: [drop, flag]
                description: Action to take (only present if status is "filtered" or "dropped")
              timestamp:
                type: string
                description: ISO timestamp when filters were applied
          timestamp:
            type: string
            description: ISO timestamp
    Error:
      name: Error
      title: Error event
      contentType: application/json
      payload:
        type: object
        required: [success, error, timestamp]
        properties:
          success:
            type: boolean
            enum: [false]
          error:
            type: object
            required: [message]
            properties:
              message:
                type: string
                description: Error message
              code:
                type: string
                description: Error code (optional)
                enum:
                  [
                    UNAUTHORIZED,
                    CHAT_ERROR,
                    INVALID_PAYLOAD,
                    FILE_UPDATE_ERROR,
                    TERMINAL_ERROR,
                  ]
              details:
                type: string
                description: Additional error details (optional)
          timestamp:
            type: string
            description: ISO timestamp
    FileUpdate:
      name: FileUpdate
      title: File update command
      contentType: application/json
      payload:
        type: object
        required: [filePath]
        properties:
          filePath:
            type: string
