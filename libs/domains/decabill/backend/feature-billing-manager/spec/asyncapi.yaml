asyncapi: 3.0.0
info:
  title: Billing Manager WebSocket Gateways
  version: 1.0.0
  description: |
    Socket.IO events for billing-manager gateways on port 8082.

    **Namespaces:** `billing` (dashboard status polling) and `projects` (live project board).

    All connections require authentication via `Authorization` in the handshake. Pass `X-Tenant` in handshake
    `extraHeaders` or `auth.tenantId`. Static API key auth is not sufficient for end-user streams.
servers:
  billing:
    host: localhost:8082
    protocol: ws
    description: Socket.IO namespace /billing
  projects:
    host: localhost:8082
    protocol: ws
    description: Socket.IO namespace /projects (PROJECTS_WEBSOCKET_NAMESPACE)
channels:
  billing/subscribeDashboardStatus:
    address: billing/subscribeDashboardStatus
    messages:
      subscribeCommand:
        $ref: '#/components/messages/SubscribeDashboardStatus'
  billing/unsubscribeDashboardStatus:
    address: billing/unsubscribeDashboardStatus
    messages:
      unsubscribeCommand:
        $ref: '#/components/messages/UnsubscribeDashboardStatus'
  billing/dashboardStatusUpdate:
    address: billing/dashboardStatusUpdate
    messages:
      statusEvent:
        $ref: '#/components/messages/DashboardStatusUpdate'
  billing/error:
    address: billing/error
    messages:
      errorEvent:
        $ref: '#/components/messages/Error'
  projects/setProject:
    address: projects/setProject
    messages:
      setProjectCommand:
        $ref: '#/components/messages/SetProject'
  projects/setProjectSuccess:
    address: projects/setProjectSuccess
    messages:
      setProjectSuccessEvent:
        $ref: '#/components/messages/SetProjectSuccess'
  projects/ticketUpsert:
    address: projects/ticketUpsert
    messages:
      ticketUpsertEvent:
        $ref: '#/components/messages/ProjectTicketUpsert'
  projects/ticketRemoved:
    address: projects/ticketRemoved
    messages:
      ticketRemovedEvent:
        $ref: '#/components/messages/ProjectTicketRemoved'
  projects/ticketCommentCreated:
    address: projects/ticketCommentCreated
    messages:
      ticketCommentCreatedEvent:
        $ref: '#/components/messages/ProjectTicketCommentCreated'
  projects/ticketActivityCreated:
    address: projects/ticketActivityCreated
    messages:
      ticketActivityCreatedEvent:
        $ref: '#/components/messages/ProjectTicketActivityCreated'
  projects/milestoneUpsert:
    address: projects/milestoneUpsert
    messages:
      milestoneUpsertEvent:
        $ref: '#/components/messages/ProjectMilestoneUpsert'
  projects/projectSummaryChanged:
    address: projects/projectSummaryChanged
    messages:
      projectSummaryChangedEvent:
        $ref: '#/components/messages/ProjectSummaryChanged'
  projects/error:
    address: projects/error
    messages:
      errorEvent:
        $ref: '#/components/messages/Error'
operations:
  clientSubscribesDashboard:
    action: send
    channel:
      $ref: '#/channels/billing~1subscribeDashboardStatus'
  serverEmitsDashboardStatus:
    action: receive
    channel:
      $ref: '#/channels/billing~1dashboardStatusUpdate'
  clientSetsProject:
    action: send
    channel:
      $ref: '#/channels/projects~1setProject'
  serverSetProjectSuccess:
    action: receive
    channel:
      $ref: '#/channels/projects~1setProjectSuccess'
  serverProjectTicketUpsert:
    action: receive
    channel:
      $ref: '#/channels/projects~1ticketUpsert'
  serverProjectsError:
    action: receive
    channel:
      $ref: '#/channels/projects~1error'
components:
  messages:
    SubscribeDashboardStatus:
      name: SubscribeDashboardStatus
      contentType: application/json
      payload:
        type: object
        properties:
          pollIntervalMs:
            type: integer
    UnsubscribeDashboardStatus:
      name: UnsubscribeDashboardStatus
      contentType: application/json
      payload:
        type: object
    DashboardStatusUpdate:
      name: DashboardStatusUpdate
      contentType: application/json
      payload:
        type: object
        required: [generatedAt, items]
        properties:
          generatedAt:
            type: string
            format: date-time
          items:
            type: array
            items:
              type: object
    SetProject:
      name: SetProject
      contentType: application/json
      payload:
        type: object
        required: [projectId]
        properties:
          projectId:
            type: string
            format: uuid
    SetProjectSuccess:
      name: SetProjectSuccess
      contentType: application/json
      payload:
        type: object
        properties:
          message: { type: string }
          projectId: { type: string, format: uuid }
    ProjectTicketUpsert:
      name: ProjectTicketUpsert
      contentType: application/json
      payload:
        type: object
        description: Full ProjectTicketResponse DTO
    ProjectTicketRemoved:
      name: ProjectTicketRemoved
      contentType: application/json
      payload:
        type: object
        required: [id, projectId]
        properties:
          id: { type: string, format: uuid }
          projectId: { type: string, format: uuid }
    ProjectTicketCommentCreated:
      name: ProjectTicketCommentCreated
      contentType: application/json
      payload:
        type: object
    ProjectTicketActivityCreated:
      name: ProjectTicketActivityCreated
      contentType: application/json
      payload:
        type: object
    ProjectMilestoneUpsert:
      name: ProjectMilestoneUpsert
      contentType: application/json
      payload:
        type: object
    ProjectSummaryChanged:
      name: ProjectSummaryChanged
      contentType: application/json
      payload:
        type: object
    Error:
      name: Error
      contentType: application/json
      payload:
        type: object
        required: [message]
        properties:
          message:
            type: string
