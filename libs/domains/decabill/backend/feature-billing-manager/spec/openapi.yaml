    get:
      summary: List service plans
      operationId: listServicePlans
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Array of service plans
          content:
            application/json:
              schema:
                type: array
                items:
