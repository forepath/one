openapi: 3.1.0
info:
  title: Billing Service API
  version: 1.0.0
  description: |
    HTTP API for billing, subscriptions, and provisioning.

    **Open positions and user billing day:** Recurring and final subscription charges are recorded as "open positions"
    instead of creating invoices immediately. A scheduler runs on each user's billing day (stored on the user;
    default is the registration day capped at 28) and creates one accumulated invoice per user containing all of that
    user's unbilled open positions as line items. This reduces the number of invoices (one per user per billing day).
    Separate from the service plan's billing_day_of_month, which controls subscription period alignment.

    **Multi-tenancy:** Send optional header `X-Tenant` on every request (defaults to `default` when omitted, unless
    `TENANTS_ALLOW_DEFAULT=false` — then missing, blank, or `default` values are rejected). Allowed values come from
    the `TENANTS` environment variable (includes `default` unless disabled). Data is isolated per tenant; the same
    email may exist in different tenants as separate users. Invalid tenant ids return 400.
  contact:
    name: ForePath
    email: hi@forepath.io
    url: https://forepath.io
servers:
  - url: http://localhost:3200/api
    description: Local development
security:
  - bearerAuth: []
paths:
  /public/service-plan-offerings:
    get:
      summary: List public service plan offerings (unauthenticated)
      description: |
        Returns active plans with fields suitable for external marketing or pricing cards: title, description,
        billing interval, customer total price, and ordering highlights. Does not include provider configuration,
        margins, or internal defaults.
      operationId: listPublicServicePlanOfferings
      security: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Page size (capped at 100; default 50)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of results to skip
        - name: serviceTypeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by service type ID
      responses:
        '200':
          description: Array of public plan offerings (active plans only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicServicePlanOffering'
  /public/service-plan-offerings/cheapest:
    get:
      summary: Get cheapest public service plan offering (unauthenticated)
      description: |
        Returns the single active plan with the lowest customer total price (same pricing formula as the list endpoint).
        Intended for "from …" / starting-at copy. When multiple plans tie on price, the plan with the lower UUID wins.
      operationId: getCheapestPublicServicePlanOffering
      security: []
      parameters:
        - name: serviceTypeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional filter — lowest price among active plans for this service type only
      responses:
        '200':
          description: Cheapest active plan offering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicServicePlanOffering'
        '404':
          description: No active plan offerings (or none matching the filter)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
