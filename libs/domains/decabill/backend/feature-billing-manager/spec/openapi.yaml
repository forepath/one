openapi: 3.1.0
info:
  title: Billing Service API
  version: 1.0.0
  description: |
    HTTP API for billing, subscriptions, and provisioning.

    **Open positions and user billing day:** Recurring and final subscription charges are recorded as "open positions"
    instead of creating invoices immediately. A scheduler runs on each user's billing day (stored on the user;
    default is the registration day capped at 28) and creates one accumulated invoice per user containing all of that
    user's unbilled open positions as line items. This reduces the number of invoices (one per user per billing day).
    Separate from the service plan's billing_day_of_month, which controls subscription period alignment.

    **Multi-tenancy:** Send optional header `X-Tenant` on every request (defaults to `default` when omitted, unless
    `TENANTS_ALLOW_DEFAULT=false` — then missing, blank, or `default` values are rejected). Allowed values come from
    the `TENANTS` environment variable (includes `default` unless disabled). Data is isolated per tenant; the same
    email may exist in different tenants as separate users. Invalid tenant ids return 400.
  contact:
    name: ForePath
    email: hi@forepath.io
    url: https://forepath.io
servers:
  - url: http://localhost:3200/api
    description: Local development
security:
  - bearerAuth: []
paths:
  /public/service-plan-offerings:
    get:
      summary: List public service plan offerings (unauthenticated)
      description: |
        Returns active plans with fields suitable for external marketing or pricing cards: title, description,
        billing interval, customer total price, and ordering highlights. Does not include provider configuration,
        margins, or internal defaults.
      operationId: listPublicServicePlanOfferings
      security: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Page size (capped at 100; default 50)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of results to skip
        - name: serviceTypeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by service type ID
      responses:
        '200':
          description: Array of public plan offerings (active plans only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicServicePlanOffering'
  /public/service-plan-offerings/cheapest:
    get:
      summary: Get cheapest public service plan offering (unauthenticated)
      description: |
        Returns the single active plan with the lowest customer total price (same pricing formula as the list endpoint).
        Intended for "from …" / starting-at copy. When multiple plans tie on price, the plan with the lower UUID wins.
      operationId: getCheapestPublicServicePlanOffering
      security: []
      parameters:
        - name: serviceTypeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional filter — lowest price among active plans for this service type only
      responses:
        '200':
          description: Cheapest active plan offering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicServicePlanOffering'
        '404':
          description: No active plan offerings (or none matching the filter)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/withdrawal/addressee:
    get:
      summary: Get statutory withdrawal addressee (unauthenticated)
      description: |
        Returns the legal seller entity (from BILLING_ISSUER_* configuration) to whom statutory withdrawals are addressed.
      operationId: getPublicWithdrawalAddressee
      security: []
      responses:
        '200':
          description: Withdrawal addressee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicWithdrawalAddressee'
        '503':
          description: Addressee configuration incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/withdrawal/request:
    post:
      summary: Request public statutory withdrawal (unauthenticated)
      operationId: requestPublicWithdrawal
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPublicWithdrawal'
      responses:
        '200':
          description: Withdrawal request created or resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicWithdrawalRequestResponse'
        '400':
          description: Invalid input or no matching subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/withdrawal/verify-code:
    post:
      summary: Verify public withdrawal confirmation code (unauthenticated)
      operationId: verifyPublicWithdrawalCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPublicWithdrawalCode'
      responses:
        '200':
          description: Code verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicWithdrawalVerifyCodeResponse'
        '400':
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/withdrawal/confirm:
    post:
      summary: Confirm public statutory withdrawal (unauthenticated)
      operationId: confirmPublicWithdrawal
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPublicWithdrawal'
      responses:
        '200':
          description: Withdrawal submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicWithdrawalConfirmResponse'
        '400':
          description: Invalid request or withdrawal not permitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /service-types:
    get:
      summary: List service types
      operationId: listServiceTypes
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Array of service types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceTypeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create service type (admin only)
      operationId: createServiceType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceTypeDto'
      responses:
        '201':
          description: Service type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTypeResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /service-types/providers:
    get:
      summary: Get all provider details
      operationId: getProviderDetails
      description: Returns registered provisioning providers with id, display name, and optional config schema for service type creation and subscription config.
      responses:
        '200':
          description: Array of provider details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderDetail'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /service-types/providers/{providerId}/server-types:
    get:
      summary: Get server types for a provider
      operationId: getProviderServerTypes
      description: Returns server types with specs and pricing for the given provider (e.g. hetzner, digital-ocean). Used by the billing console for server type dropdown and to auto-set plan base price when configSchema.basePriceFromField is set.
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
            examples: [hetzner]
        - name: serviceTypeId
          in: query
          required: false
          description: When set, resolves platform API credentials from this service type instead of global environment variables.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of server types with id, name, specs, priceMonthly, priceHourly
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServerType'
        '400':
          description: Bad request (e.g. provider not supported or token missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /service-types/providers/{providerId}/locations:
    get:
      summary: Get geography options for a provider
      operationId: getProviderLocations
      description: Returns locations (Hetzner) or regions (DigitalOcean) with human-readable labels. Used by the billing console for geography enum dropdowns. Labels are resolved from the provider API with static fallbacks when the API is unavailable.
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
            examples: [hetzner]
        - name: serviceTypeId
          in: query
          required: false
          description: When set, resolves platform API credentials from this service type instead of global environment variables.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of geography options with technical id and human-readable name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderLocation'
        '400':
          description: Bad request (e.g. provider not supported or token missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /service-types/{id}:
    get:
      summary: Get service type
      operationId: getServiceType
      parameters:
        - $ref: '#/components/parameters/ServiceTypeId'
      responses:
        '200':
          description: Service type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTypeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Update service type (admin only)
      operationId: updateServiceType
      parameters:
        - $ref: '#/components/parameters/ServiceTypeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServiceTypeDto'
      responses:
        '200':
          description: Service type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceTypeResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
