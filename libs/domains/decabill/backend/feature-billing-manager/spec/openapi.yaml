          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookEndpointDto'
      responses:
        '201':
          description: Created endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointResponseDto'
  /admin/billing/webhooks/{id}:
    get:
      tags: [Admin Billing]
      summary: Get webhook endpoint (admin)
      operationId: getAdminWebhookEndpoint
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Webhook endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointResponseDto'
    put:
      tags: [Admin Billing]
      summary: Update webhook endpoint (admin)
      operationId: updateAdminWebhookEndpoint
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookEndpointDto'
      responses:
        '200':
          description: Updated endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointResponseDto'
    delete:
      tags: [Admin Billing]
      summary: Delete webhook endpoint (admin)
      operationId: deleteAdminWebhookEndpoint
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted
  /admin/billing/webhooks/{id}/test:
    post:
      tags: [Admin Billing]
      summary: Send test webhook delivery (admin)
      operationId: testAdminWebhookEndpoint
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Delivery result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveryResponseDto'
  /admin/billing/webhooks/{id}/deliveries:
    get:
      tags: [Admin Billing]
      summary: List webhook deliveries (admin)
      operationId: listAdminWebhookDeliveries
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated deliveries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWebhookDeliveriesResponseDto'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 0
      description: Maximum number of results to return (default 10)
    Offset:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
      description: Number of results to skip (default 0)
    ServiceTypeId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Service type ID
    ServicePlanId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Service plan ID
    SubscriptionId:
      in: path
      name: subscriptionId
      required: true
      schema:
        type: string
        format: uuid
      description: Subscription ID
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
      description: Project ID
    TicketId:
      in: path
      name: ticketId
      required: true
      schema:
        type: string
        format: uuid
      description: Project ticket ID
    BackorderId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Backorder ID
    UserId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: User ID
    XTentHeader:
      in: header
      name: X-Tenant
      required: false
      schema:
        type: string
        default: default
      description: |
        Tenant id for request scoping. Defaults to `default` when omitted (unless `TENANTS_ALLOW_DEFAULT=false`).
        When default is disabled, missing, blank, or `default` values are rejected. Must be listed in the server
        `TENANTS` allowlist. Invalid values return 400.
  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ChangePasswordResponse:
      type: object
      properties:
        message:
          type: string
        access_token:
          type: string
    LogoutDto:
      type: object
      properties:
        invalidateAllSessions:
          type: boolean
          description: When true, invalidates every active JWT session for the user. Default is false (current session only).
    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'
        scopes:
          type: array
          items:
            type: string
    PatLoginResponse:
      $ref: '#/components/schemas/LoginResponse'
    ExchangePersonalAccessTokenDto:
      type: object
      required: [token]
      properties:
        token:
          type: string
    CreatePersonalAccessTokenDto:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
    UpdatePersonalAccessTokenDto:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
    PersonalAccessTokenScopeDto:
      type: object
      required: [scope]
      properties:
        scope:
          type: string
    PersonalAccessTokenResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tokenPrefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        token:
          type: string
    RegisterDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    RegisterResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        message:
          type: string
    ConfirmEmailDto:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: '^[A-Z0-9]{6}$'
    RequestPasswordResetDto:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordDto:
      type: object
      required: [email, code, newPassword]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: '^[A-Z0-9]{6}$'
        newPassword:
          type: string
          format: password
          minLength: 8
    ChangePasswordDto:
      type: object
      required: [currentPassword, newPassword, newPasswordConfirmation]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8
        newPasswordConfirmation:
          type: string
          format: password
          minLength: 8
    CreateUserDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: '#/components/schemas/UserRole'
    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          $ref: '#/components/schemas/UserRole'
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        emailConfirmedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserRole:
      type: string
      enum: [user, admin]
    ProviderDetail:
      type: object
      required: [id, displayName]
      description: A registered provisioning provider (e.g. Hetzner) with id, display name, and optional config schema.
      properties:
        id:
          type: string
          description: Provider identifier (e.g. hetzner, digital-ocean). Used as the value for service type provider field.
        displayName:
          type: string
          description: Human-readable display name (e.g. Hetzner Cloud-Init).
        configSchema:
          type: object
          description: |
            Optional JSON schema for provider-specific configuration when creating subscriptions.
            - `properties`: each property may include `type`, `description`, optionally `enum` (array of allowed values), `scope` (`server` or `product`), and `productServices` (`controller`, `manager`).
              Server-scoped fields appear under provider defaults in the plan editor; product-scoped fields appear under product defaults when required by selected customer options.
            - `basePriceFromField`: optional string (e.g. "serverType") indicating which field's selected option drives the plan base price;
              the UI should fetch options from GET .../providers/{id}/server-types and use the selected option's price as base price.
        envDefaultFields:
          type: array
          description: Platform environment variables that can be overridden per service type (e.g. HETZNER_API_TOKEN).
          items:
            $ref: '#/components/schemas/ProviderEnvDefaultField'
    ProviderEnvDefaultField:
      type: object
      required: [envKey, label, sensitive, type]
      properties:
        envKey:
          type: string
          description: Environment variable name (e.g. HETZNER_API_TOKEN)
        label:
          type: string
          description: Human-readable field label for the admin UI
        sensitive:
          type: boolean
          description: When true, value is write-only in API responses
        type:
          type: string
          enum: [string]
    ServerType:
      type: object
      description: Provider server type with specs and pricing (from GET .../providers/{providerId}/server-types).
      properties:
        id: { type: string, description: 'Unique identifier (e.g. cax11)' }
        name: { type: string, description: 'Human-readable name' }
        cores: { type: number }
        memory: { type: number, description: 'RAM in GB' }
        disk: { type: number, description: 'Disk in GB' }
        priceMonthly:
          { type: number, description: 'Price per month (e.g. EUR)' }
        priceHourly: { type: number, description: 'Price per hour (e.g. EUR)' }
        description: { type: string }
    ProviderLocation:
      type: object
      description: Provider geography option (location or region) with human-readable label.
      required: [id, name]
      properties:
        id:
          type: string
          description: Technical slug used for provisioning (e.g. fsn1, fra1)
        name:
          type: string
          description: Human-readable display name from provider API or static fallback
        city:
          type: string
          description: City when provided by the provider API (Hetzner)
        country:
          type: string
          description: ISO country code when provided by the provider API
    CreateServiceTypeDto:
      type: object
      required: [key, name, provider]
      properties:
        key:
          type: string
          description: Unique service type key
        name:
          type: string
          description: Display name
        description:
          type: string
          description: Optional description
        provider:
          type: string
          description: Provider identifier (e.g. hetzner, digital-ocean)
        configSchema:
          type: object
          description: JSON schema for provider configuration
        isActive:
          type: boolean
          description: Whether the service type is active
        disallowStatutoryWithdrawal:
          type: boolean
          description: When true, statutory withdrawal is blocked after provisioning (unprovisioned orders remain withdrawable).
        providerDefaults:
          type: object
          additionalProperties:
            type: string
          description: Write-only platform credential overrides (e.g. HETZNER_API_TOKEN). Omit or leave values blank to use environment defaults.
    UpdateServiceTypeDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        provider:
          type: string
        configSchema:
          type: object
        isActive:
          type: boolean
        disallowStatutoryWithdrawal:
          type: boolean
          description: When true, statutory withdrawal is blocked after provisioning.
        providerDefaults:
          type: object
          additionalProperties:
            type: string
          description: Write-only platform credential overrides. Empty values clear overrides on update.
    ServiceTypeResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        provider: { type: string }
        configSchema: { type: object }
        isActive: { type: boolean }
        disallowStatutoryWithdrawal: { type: boolean }
        providerDefaultsConfigured:
          type: object
          additionalProperties:
            type: boolean
          description: Indicates which platform env overrides are configured (never returns secret values).
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ServicePlanOrderingHighlight:
      type: object
      required: [icon, text]
      description: |
        One ordered line for catalog or checkout UI. `icon` is an opaque string (e.g. icon-set key or URL)
        interpreted by the client; `text` is human-readable copy shown beside the icon.
      properties:
        icon:
          type: string
          maxLength: 128
        text:
          type: string
          maxLength: 512
    PublicWithdrawalAddressee:
      type: object
      required:
        - name
        - lines
      properties:
        name:
          type: string
        lines:
          type: array
          items:
            type: string
        vatId:
          type: string
        email:
          type: string
          format: email
    RequestPublicWithdrawal:
      type: object
      required:
        - subscriptionNumber
        - customerName
        - email
        - orderedOn
      properties:
        subscriptionNumber:
          type: string
          pattern: '^SUB-\d{6}$'
        customerName:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        company:
          type: string
          maxLength: 255
        orderedOn:
          type: string
          format: date
        receivedOn:
          type: string
          format: date
    PublicWithdrawalRequestResponse:
      type: object
      required:
        - requestId
        - resumed
        - resumeStep
        - message
      properties:
        requestId:
          type: string
          format: uuid
        resumed:
          type: boolean
        resumeStep:
          type: string
          enum: [code, acknowledge]
        message:
          type: string
    VerifyPublicWithdrawalCode:
      type: object
      required:
        - requestId
        - code
      properties:
        requestId:
          type: string
          format: uuid
        code:
          type: string
          pattern: '^[A-Z0-9]{6}$'
    PublicWithdrawalVerifyCodeResponse:
      type: object
      required:
        - resumeStep
        - message
      properties:
        resumeStep:
          type: string
          enum: [acknowledge]
        message:
          type: string
    ConfirmPublicWithdrawal:
      type: object
      required:
        - requestId
        - acknowledgeWithdrawal
      properties:
        requestId:
          type: string
          format: uuid
        acknowledgeWithdrawal:
          type: boolean
          enum: [true]
    PublicWithdrawalConfirmResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    PublicServicePlanOffering:
      type: object
      required:
        - id
        - name
        - serviceTypeId
        - serviceTypeName
        - billingIntervalType
        - billingIntervalValue
        - totalPrice
        - totalGross
        - taxRate
        - orderingHighlights
        - allowCustomerLocationSelection
        - allowCustomerServerTypeSelection
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        serviceTypeId:
          type: string
          format: uuid
        serviceTypeName:
          type: string
          description: Display name of the service type (no config schema)
        billingIntervalType:
          type: string
          enum: [hour, day, month]
        billingIntervalValue:
          type: integer
          minimum: 1
        totalPrice:
          type: number
          description: Customer-facing net total price (same formula as internal pricing preview; margin breakdown not exposed)
        totalGross:
          type: number
          description: Customer-facing gross total price (incl. VAT)
        taxRate:
          type: number
          description: Applied VAT rate in percent for this plan
        totalPriceFrom:
          type: number
          description: Lowest customer-facing net total across allowed server types when allowCustomerServerTypeSelection is true; omitted when not applicable.
        totalGrossFrom:
          type: number
          description: Lowest customer-facing gross total across allowed server types when allowCustomerServerTypeSelection is true; omitted when not applicable.
        orderingHighlights:
          type: array
          items:
            $ref: '#/components/schemas/ServicePlanOrderingHighlight'
        allowCustomerLocationSelection:
          type: boolean
          description: When true, authenticated checkout may send region or location in subscription requestedConfig (schema must define a string enum for that field on the service type).
        allowCustomerServerTypeSelection:
          type: boolean
          description: When true, authenticated checkout may send serverType in subscription requestedConfig; value must be in allowedServerTypes on the plan.
        withdrawalPolicy:
          $ref: '#/components/schemas/WithdrawalPolicy'
    CreateServicePlanDto:
      type: object
      required: [serviceTypeId, name, billingIntervalType, billingIntervalValue]
      properties:
        serviceTypeId:
          type: string
          format: uuid
          description: Service type ID
        name:
          type: string
        description:
          type: string
        billingIntervalType:
          type: string
          enum: [hour, day, month]
        billingIntervalValue:
          type: integer
          minimum: 1
        billingDayOfMonth:
          type: integer
          minimum: 1
          maximum: 31
        cancelAtPeriodEnd:
          type: boolean
        minCommitmentDays:
          type: integer
        noticeDays:
          type: integer
        basePrice:
          type: string
          description: Decimal string
        marginPercent:
          type: string
          description: Decimal string
        marginFixed:
          type: string
          description: Decimal string
        providerConfigDefaults:
          type: object
          description: |
            Provider defaults merged with customer requestedConfig on order.
            Provisioning-enabled plans store customer-selectable stacks in provisioningOptions
            (integrated controller/manager and/or custom CloudInit config ids).
            Legacy service and cloudInitConfigId keys are derived at persistence time only for single-option plans.
        orderingHighlights:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/ServicePlanOrderingHighlight'
          description: Ordered icon/text lines shown with the plan in addition to description.
        isActive:
          type: boolean
        allowCustomerLocationSelection:
          type: boolean
          description: Requires service type schema with region or location string enum. Ignored when false or omitted.
        allowCustomerServerTypeSelection:
          type: boolean
          description: Requires provider schema with basePriceFromField serverType. When true, allowedServerTypes must list at least one server type id.
        allowedServerTypes:
          type: array
          items: { type: string }
          description: Server type ids customers may choose at checkout when allowCustomerServerTypeSelection is true.
        taxCategory:
          type: string
          enum: [standard, reduced]
          description: VAT category applied to automated subscription charges for this plan
    UpdateServicePlanDto:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        billingIntervalType: { type: string, enum: [hour, day, month] }
        billingIntervalValue: { type: integer, minimum: 1 }
        billingDayOfMonth: { type: integer, minimum: 1, maximum: 31 }
        cancelAtPeriodEnd: { type: boolean }
        minCommitmentDays: { type: integer }
        noticeDays: { type: integer }
        basePrice: { type: string }
        marginPercent: { type: string }
        marginFixed: { type: string }
        providerConfigDefaults: { type: object }
        orderingHighlights:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/ServicePlanOrderingHighlight'
        isActive: { type: boolean }
        allowCustomerLocationSelection: { type: boolean }
        allowCustomerServerTypeSelection: { type: boolean }
        allowedServerTypes:
          type: array
          items: { type: string }
        taxCategory:
          type: string
          enum: [standard, reduced]
    ServicePlanResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        serviceTypeId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        billingIntervalType: { type: string, enum: [hour, day, month] }
        billingIntervalValue: { type: integer }
        billingDayOfMonth: { type: integer, nullable: true }
        cancelAtPeriodEnd: { type: boolean }
        minCommitmentDays: { type: integer }
        noticeDays: { type: integer }
        basePrice: { type: string, nullable: true }
        marginPercent: { type: string, nullable: true }
        marginFixed: { type: string, nullable: true }
        providerConfigDefaults: { type: object }
        orderingHighlights:
          type: array
          items:
            $ref: '#/components/schemas/ServicePlanOrderingHighlight'
          description: Ordered icon/text lines for display alongside description.
        allowCustomerLocationSelection:
          type: boolean
          description: When true, POST /subscriptions may include region or location in requestedConfig to override plan defaults (values must match service type schema enum).
        allowCustomerServerTypeSelection:
          type: boolean
          description: When true, POST /subscriptions may include serverType in requestedConfig; value must be listed in allowedServerTypes.
        allowedServerTypes:
          type: array
          items: { type: string }
          description: Server type ids available for customer selection when allowCustomerServerTypeSelection is true.
        taxCategory:
          type: string
          enum: [standard, reduced]
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        withdrawalPolicy:
          $ref: '#/components/schemas/WithdrawalPolicy'
    AvailabilityCheckDto:
      type: object
      required: [serviceTypeId, region, serverType]
      properties:
        serviceTypeId:
          type: string
          format: uuid
        region:
          type: string
        serverType:
          type: string
        requestedConfig:
          type: object
    AvailabilityResponse:
      type: object
      properties:
        isAvailable: { type: boolean }
        reason: { type: string }
        alternatives: { type: object }
    RequestedConfig:
      type: object
      description: |
        Optional cloud-init and provisioning config merged with plan defaults.
        May also include provider-specific fields (e.g. serverType, location, firewallId for Hetzner).
        Region or location overrides are accepted only when the plan has allowCustomerLocationSelection and the service type schema defines that field with an enum; otherwise they are ignored server-side.
        serverType overrides are accepted only when the plan has allowCustomerServerTypeSelection and the value is listed in allowedServerTypes; otherwise serverType is stripped from requestedConfig before merge.
        The FQDN (hostname.DNS_BASE_DOMAIN) is used for SSL certificates and CORS; DNS_BASE_DOMAIN
        defaults to spirde.com when not set.
        For service manager, disableSignup and provisioning tokens are ignored; authenticationMethod must be api-key or keycloak (not users).
      additionalProperties: true
      properties:
        provisioningOptionKey:
          type: string
          description: |
            Customer choice when the plan offers multiple provisioningOptions entries
            (for example integrated:controller or custom:<cloud-init-config-uuid>).
            Required when the plan has more than one option; omitted when the plan has exactly one option.
        service:
          type: string
          enum: [controller, manager, custom]
          description: Product service kind. Use controller for the full stack, manager for the agent manager only, or custom for admin-defined Docker templates.
        env:
          type: object
          additionalProperties: { type: string }
          description: Customer-provided environment variables for custom service plans. Merged with admin defaults server-side.
        region:
          type: string
          description: DigitalOcean-style region; use the key matching the service type schema (region or location).
        location:
          type: string
          description: Hetzner-style location; use the key matching the service type schema (region or location).
        authenticationMethod:
          type: string
          description: Authentication method (users, api-key, keycloak). Default users.
        staticApiKey:
          type: string
          description: Static API key for api-key authentication. Required when authenticationMethod is api-key.
        disableSignup:
          type: boolean
          description: Whether to disable user signup. Default false.
        smtp:
          type: object
          description: SMTP configuration for email.
          properties:
            host: { type: string, description: 'SMTP host (default mailhog)' }
            port: { type: number, description: 'SMTP port (default 1025)' }
            user: { type: string }
            password: { type: string }
            from:
              {
                type: string,
                description: 'From address (default noreply@localhost)',
              }
