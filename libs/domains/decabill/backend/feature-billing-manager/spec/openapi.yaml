          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create service plan (admin only)
      operationId: createServicePlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServicePlanDto'
      responses:
        '201':
          description: Service plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePlanResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /service-plans/{id}/cloud-init-configs/{configId}/order-fields:
    get:
      summary: Get order form fields for a CloudInit config on a service plan
      operationId: getServicePlanCloudInitOrderFields
      parameters:
        - $ref: '#/components/parameters/ServicePlanId'
        - name: configId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Fields shown in the customer order form for the selected plan option
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CloudInitConfigOrderField'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service plan or CloudInit config not found for this plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /service-plans/{id}:
    get:
      summary: Get service plan
      operationId: getServicePlan
      parameters:
        - $ref: '#/components/parameters/ServicePlanId'
      responses:
        '200':
          description: Service plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePlanResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Update service plan (admin only)
      operationId: updateServicePlan
      parameters:
        - $ref: '#/components/parameters/ServicePlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServicePlanDto'
      responses:
        '200':
          description: Service plan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePlanResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete service plan (admin only)
      operationId: deleteServicePlan
      parameters:
        - $ref: '#/components/parameters/ServicePlanId'
      responses:
        '204':
          description: Service plan deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /cloud-init-configs:
    get:
      summary: List CloudInit configs (admin only)
      operationId: listCloudInitConfigs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: CloudInit configs (default values masked in list)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CloudInitConfigResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create CloudInit config (admin only)
      operationId: createCloudInitConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCloudInitConfigDto'
      responses:
        '201':
          description: CloudInit config created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudInitConfigResponse'
        '400':
          description: Validation error
          content:
