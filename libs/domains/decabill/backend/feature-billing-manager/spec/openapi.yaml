          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityCheckDto'
      responses:
        '200':
          description: Availability result with alternatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          description: Invalid request or provider error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      summary: Login
      description: |
        Interactive console login with account password only.
        Personal access tokens are not accepted; use POST /auth/token instead.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/token:
    post:
      summary: Exchange personal access token for machine JWT
      description: |
        Token-only exchange (no email). Returns a JWT with `amr: ["pat"]` and capability `scopes`.
      operationId: exchangePersonalAccessToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangePersonalAccessTokenDto'
      responses:
        '200':
          description: JWT access token, user info, and scopes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatLoginResponse'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/register:
    post:
      summary: Register
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: Registration successful
          content:
