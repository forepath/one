      summary: Get CloudInit config (admin only)
      operationId: getCloudInitConfig
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: CloudInit config including decrypted default values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudInitConfigResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
