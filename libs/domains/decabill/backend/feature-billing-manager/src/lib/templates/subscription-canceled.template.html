{{#> email-layout}}
<h1 class="email-title">Subscription canceled</h1>
<p>Dear {{recipientName}},</p>
<p>Your subscription "<strong>{{planName}}</strong>" has been canceled.</p>
{{#if effectiveDate}}
<p>Effective date: <strong>{{effectiveDate}}</strong></p>
{{/if}}
<p>If this was unexpected, please contact support or renew from your billing account.</p>
{{/email-layout}}
