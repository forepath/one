{{#> email-layout}}
<h1 class="email-title">Upcoming subscription renewal</h1>
<p>Dear {{recipientName}},</p>
<p>
  Your subscription "<strong>{{planName}}</strong>" is scheduled for renewal on
  <strong>{{renewalDate}}</strong>.
</p>
<p>If you wish to cancel, please log in to your account before the renewal date.</p>
{{/email-layout}}
