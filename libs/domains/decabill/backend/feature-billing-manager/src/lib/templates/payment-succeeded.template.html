{{#> email-layout}}
<h1 class="email-title">Payment received</h1>
<p>Dear {{recipientName}},</p>
<p>We received your payment for invoice <strong>{{invoiceNumber}}</strong>.</p>
{{#if amountLabel}}
<p>Amount paid: <strong>{{amountLabel}}</strong></p>
{{/if}}
<p>Thank you for your payment.</p>
{{/email-layout}}
