<div class="project-milestone-select">
  @if (selectedMilestone(); as milestone) {
    <small
      class="info-badge text-muted bg-body-tertiary py-1 px-2 rounded d-inline-flex align-items-center gap-1 project-milestone-select__chip"
    >
      <span class="text-truncate small">{{ milestone.name }}</span>
      <button
        type="button"
        class="btn btn-link btn-sm p-0 ms-1 align-baseline flex-shrink-0"
        [disabled]="disabled()"
        (click)="clearSelection()"
        i18n-aria-label="@@featureProjectMilestoneSelect-clearSelectionAria"
        aria-label="Clear selected milestone"
      >
        <i class="bi bi-x" aria-hidden="true"></i>
      </button>
    </small>
  } @else {
    <div class="position-relative">
      <input
        [id]="inputId()"
        type="text"
        class="form-control"
        [class.form-control-sm]="compact()"
        autocomplete="off"
        [disabled]="disabled()"
        [ngModel]="searchQuery()"
        (ngModelChange)="onSearchChange($event)"
        (focus)="onSearchFocus()"
        (blur)="onSearchBlur()"
        [placeholder]="placeholder()"
      />
      @if (suggestionsOpen() && filteredMilestones().length > 0) {
        <ul
          class="dropdown-menu show position-absolute shadow-sm border mt-1 py-0 w-100 project-milestone-select__suggestions"
        >
          @for (milestone of filteredMilestones(); track milestone.id) {
            <li>
              <button
                type="button"
                class="dropdown-item py-2 text-start"
                (mousedown)="pickMilestone(milestone, $event)"
              >
                <span class="d-block small fw-medium text-truncate">{{ milestone.name }}</span>
                @if (milestone.targetDate) {
                  <span class="d-block text-muted small">{{ milestone.targetDate | date: 'mediumDate' }}</span>
                }
              </button>
            </li>
          }
        </ul>
      } @else if (suggestionsOpen() && searchQuery().trim()) {
        <ul
          class="dropdown-menu show position-absolute shadow-sm border mt-1 py-0 w-100 project-milestone-select__suggestions"
        >
          <li>
            <span class="dropdown-item-text text-muted small" i18n="@@featureProjectMilestoneSelect-noMilestones"
              >No milestones found.</span
            >
          </li>
        </ul>
      }
    </div>
  }
</div>
