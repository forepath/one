components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    fileManagerContext:
      name: context
      in: query
      required: false
      schema:
        type: string
        enum: [app, config]
        default: app
      description: |
        Proxied to agent-manager. `app` (default) is the workspace root; `config` is the provider configuration directory when supported.
        When `config` is set, the caller must have workspace management rights (same as other workspace configuration APIs).
  schemas:
    AuthenticationType:
      type: string
      enum:
        - api_key
        - keycloak
    AuthenticationMethod:
      type: string
      enum:
        - api-key
        - keycloak
        - users
      description: Server authentication method (api-key, keycloak, or users)
    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RegisterDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    ConfirmEmailDto:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          description: User's email address
        code:
          type: string
          pattern: '^[A-Z0-9]{6}$'
          description: 6-character alphanumeric confirmation code from email (A-Z, 0-9)
    RequestPasswordResetDto:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordDto:
      type: object
      required: [email, code, newPassword]
      properties:
        email:
          type: string
          format: email
          description: User's email address
        code:
          type: string
          pattern: '^[A-Z0-9]{6}$'
          description: 6-character alphanumeric reset code from email (A-Z, 0-9)
        newPassword:
          type: string
          minLength: 8
    ChangePasswordDto:
      type: object
      required: [currentPassword, newPassword, newPasswordConfirmation]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
        newPasswordConfirmation:
          type: string
          minLength: 8
    LoginResponse:
      type: object
      required: [access_token, user]
      properties:
        access_token:
          type: string
          description: JWT bearer token
        user:
          type: object
          required: [id, email, role]
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
            role:
              $ref: '#/components/schemas/UserRole'
    RegisterResponse:
      type: object
      required: [user, message]
      properties:
        user:
          type: object
          required: [id, email, role]
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
            role:
              $ref: '#/components/schemas/UserRole'
        message:
          type: string
    UserRole:
      type: string
      enum:
        - user
        - admin
    UserResponseDto:
      type: object
      required: [id, email, role, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        emailConfirmedAt:
          type: string
          format: date-time
        lockedAt:
          type:
            - string
            - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateUserDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/UserRole'
    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/UserRole'
    ClientResponseDto:
      type: object
      required:
        [
          id,
          name,
          endpoint,
          authenticationType,
          isAutoProvisioned,
          canManageWorkspaceConfiguration,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        endpoint:
          type: string
          format: uri
        authenticationType:
          $ref: '#/components/schemas/AuthenticationType'
        agentWsPort:
          type: integer
          minimum: 1
          maximum: 65535
          description: Optional Socket.IO port for the client's agents gateway
        config:
          $ref: '#/components/schemas/ConfigResponseDto'
          description: Configuration from the agent-manager instance (optional, may be undefined if agent-manager is unreachable)
        isAutoProvisioned:
          type: boolean
          description: Indicates whether the client was auto-provisioned via server provisioning. Used to determine if server info endpoints should be called.
        canManageWorkspaceConfiguration:
          type: boolean
          description: |
            True if the current caller may change prototype autonomy, agent environment variables, agent CRUD,
            and workspace (client) update/delete. Requires global admin, workspace creator, client_users admin,
            API key authentication, or api-key server mode.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateClientDto:
      type: object
      required: [name, endpoint, authenticationType]
      properties:
        name:
          type: string
        description:
          type: string
        endpoint:
          type: string
          format: uri
        authenticationType:
          $ref: '#/components/schemas/AuthenticationType'
        apiKey:
          type: string
          description: API key (optional, will be auto-generated if not provided for API_KEY type)
        keycloakClientId:
          type: string
