          type: string
          enum: [reuse_per_ticket, new_per_run]
          description: >
            `reuse_per_ticket` (default): reuse `automation/ticket-{ticketId}` when it exists. `new_per_run`: create a
            fresh `automation/{runIdPrefix}` branch for every run (legacy behaviour).
        forceNewAutomationBranchNextRun:
          type: boolean
          description: >
            When true with `reuse_per_ticket`, the next automation run uses an ephemeral branch; cleared when that run
            starts branch setup. Lets operators force a clean branch without switching strategy permanently.
