openapi: 3.1.0
info:
  title: Agent Controller API
  version: 1.0.0
  description: HTTP API for managing clients and proxied agent operations
  contact:
    name: ForePath
    email: hi@forepath.io
    url: https://forepath.io
servers:
  - url: http://localhost:3100/api
    description: Local development
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      summary: Login (users auth only)
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: JWT access token and user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials, email not confirmed, or account locked
  /auth/register:
    post:
      summary: Register new user (users auth only)
      description: |
        Registers a new user. When DISABLE_SIGNUP is true, returns 503 Service Unavailable.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: User created (first user auto-confirmed, others receive 6-character alphanumeric confirmation code via email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '409':
          description: Email already registered
        '503':
          description: Signup is disabled (DISABLE_SIGNUP=true)
  /auth/confirm-email:
    post:
      summary: Confirm email with 6-character code (users auth only)
      operationId: confirmEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailDto'
      responses:
        '200':
          description: Email confirmed
        '400':
          description: Invalid or expired confirmation code
  /auth/request-password-reset:
    post:
      summary: Request password reset (users auth only)
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetDto'
      responses:
        '200':
          description: If an account exists with this email, a 6-character password reset code will be sent
  /auth/reset-password:
    post:
      summary: Reset password with 6-character code (users auth only)
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordDto'
      responses:
        '200':
          description: Password reset
        '400':
          description: Invalid or expired reset code
  /auth/change-password:
    post:
      summary: Change password (authenticated users)
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '200':
          description: Password changed
        '400':
          description: Passwords do not match or invalid
        '401':
          description: Current password incorrect
  /users:
    get:
      summary: List users (admin only)
      operationId: listUsers
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 0
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponseDto'
    post:
      summary: Create user (admin only)
      operationId: createUser
      description: >
        Creates a new user. First user is auto-confirmed. Non-first users receive a
        confirmation email (same as self-registration); they must confirm before logging in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: User created (first user auto-confirmed, others receive confirmation email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '409':
          description: Email already exists
  /users/{id}:
    get:
      summary: Get user by id (admin only)
      operationId: getUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '404':
          description: User not found
    post:
      summary: Update user (admin only)
      operationId: updateUser
      description: >
        Updates a user. When email is changed, the account is set unconfirmed and a
        confirmation email is sent to the new address (same as self-registration).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: User updated (email change triggers confirmation email to new address)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '404':
          description: User not found
    delete:
      summary: Delete user (admin only)
      operationId: deleteUser
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found
  /users/{id}/lock:
    post:
      summary: Lock user account (admin only)
      operationId: lockUser
      description: >
        Locks the target user account immediately. Locked users cannot authenticate
        in users-auth mode. Admins cannot lock themselves.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '400':
          description: Self-lock is not allowed
        '404':
          description: User not found
  /users/{id}/unlock:
    post:
      summary: Unlock user account (admin only)
      operationId: unlockUser
      description: >
        Unlocks the target user account by clearing lock timestamp.
        Admins cannot unlock themselves.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '400':
          description: Self-unlock is not allowed
        '404':
          description: User not found
  /filter-rules:
    get:
      summary: List regex filter rules (admin only)
      operationId: listFilterRules
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Maximum number of rules to return
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of rules to skip (pagination)
      responses:
        '200':
          description: Rules with per-workspace sync summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FilterRuleResponseDto'
        '403':
          description: Forbidden
    post:
      summary: Create filter rule (admin only)
      operationId: createFilterRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFilterRuleDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterRuleResponseDto'
        '400':
          description: Validation error
        '403':
          description: Forbidden
  /filter-rules/{id}:
    get:
      summary: Get filter rule (admin only)
      operationId: getFilterRule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterRuleResponseDto'
        '403':
          description: Forbidden
        '404':
          description: Not found
    put:
      summary: Update filter rule (admin only)
      operationId: updateFilterRule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFilterRuleDto'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterRuleResponseDto'
        '400':
          description: Validation error
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      summary: Delete filter rule (admin only)
      operationId: deleteFilterRule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
        '404':
          description: Not found
  /imports/atlassian/connections:
    get:
      summary: List Atlassian site connections (admin only)
      operationId: listAtlassianSiteConnections
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Maximum number of connections to return
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of connections to skip (pagination)
      responses:
        '200':
          description: Connections (API tokens never returned)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AtlassianSiteConnectionResponseDto'
        '403':
          description: Forbidden
    post:
      summary: Create Atlassian site connection (admin only)
      operationId: createAtlassianSiteConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAtlassianSiteConnectionDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AtlassianSiteConnectionResponseDto'
        '400':
          description: Validation error
        '403':
          description: Forbidden
  /imports/atlassian/connections/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get Atlassian site connection (admin only)
      operationId: getAtlassianSiteConnection
      responses:
        '200':
          description: Connection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AtlassianSiteConnectionResponseDto'
        '403':
          description: Forbidden
        '404':
          description: Not found
    put:
      summary: Update Atlassian site connection (admin only)
      operationId: updateAtlassianSiteConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAtlassianSiteConnectionDto'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AtlassianSiteConnectionResponseDto'
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      summary: Delete Atlassian site connection (admin only)
      operationId: deleteAtlassianSiteConnection
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
        '404':
          description: Not found
  /imports/atlassian/connections/{id}/test:
    post:
      summary: Test Atlassian connection (admin only)
      operationId: testAtlassianSiteConnection
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AtlassianConnectionTestResultDto'
        '403':
          description: Forbidden
  /imports/atlassian/configs:
    get:
      summary: List external import configs (admin only)
      operationId: listExternalImportConfigs
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Maximum number of configs to return
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of configs to skip (pagination)
      responses:
        '200':
          description: Configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExternalImportConfigResponseDto'
        '403':
          description: Forbidden
    post:
      summary: Create import config (admin only)
      operationId: createExternalImportConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExternalImportConfigDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalImportConfigResponseDto'
        '400':
          description: Validation error
        '403':
          description: Forbidden
  /imports/atlassian/configs/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get import config (admin only)
      operationId: getExternalImportConfig
      responses:
        '200':
          description: Config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalImportConfigResponseDto'
        '403':
          description: Forbidden
        '404':
          description: Not found
    put:
      summary: Update import config (admin only)
      operationId: updateExternalImportConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExternalImportConfigDto'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalImportConfigResponseDto'
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      summary: Delete import config (admin only)
      operationId: deleteExternalImportConfig
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden
        '404':
          description: Not found
  /imports/atlassian/configs/{id}/run:
    post:
      summary: Run import once for config (admin only)
      operationId: runExternalImportConfig
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Accepted
        '403':
          description: Forbidden
  /imports/atlassian/configs/{id}/markers:
    delete:
      summary: Clear sync markers for config (admin only)
      operationId: clearExternalImportMarkers
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Cleared
        '403':
          description: Forbidden
  /tickets:
    get:
      summary: List project tickets
      description: |
        Returns tickets for workspaces the user can access; global admins see all.
        For realtime list coherence after mutations, subscribe to the Socket.IO **tickets** namespace
        (see AsyncAPI `tickets/*` channels in `spec/asyncapi.yaml`); REST remains the source of truth for loads.
      operationId: listTickets
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, todo, in_progress, prototype, done, closed]
        - in: query
          name: parentId
          schema:
            type: string
          description: Use literal `null` for root tickets only
      responses:
        '200':
          description: Ticket list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketResponseDto'
        '403':
          description: Forbidden
    post:
      summary: Create ticket
      description: |
        Optional `creationTemplate` is request-only and not stored. Value `specification` creates four spec-driven subtasks
        under the new root ticket in one transaction; invalid with `parentId` (400).
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTicketResponseDto'
  /tickets/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get ticket
      operationId: getTicket
      parameters:
        - in: query
          name: includeDescendants
          schema:
            type: boolean
      responses:
        '200':
          description: Ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponseDto'
        '404':
          description: Not found
    patch:
      summary: Update ticket
      operationId: updateTicket
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketDto'
      responses:
        '200':
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponseDto'
    delete:
      summary: Delete ticket
      operationId: deleteTicket
      parameters:
        - in: query
          name: releaseExternalSyncMarker
          required: false
          schema:
            type: boolean
            default: false
          description: >
            When true, deletes external import sync markers tied to this ticket so the same remote item may be imported again.
            When false (default), markers are kept with a null local id so scheduled import skips re-creating the row until markers are cleared.
      responses:
        '204':
          description: Deleted
        '409':
          description: Has subtasks
  /tickets/{id}/prototype-prompt:
    get:
      summary: Build prototype prompt for ticket tree
      operationId: getTicketPrototypePrompt
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Prototype prompt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrototypePromptResponseDto'
  /tickets/{id}/comments:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List ticket comments
      operationId: listTicketComments
      responses:
        '200':
          description: Ticket comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketCommentResponseDto'
    post:
      summary: Add ticket comment
      operationId: addTicketComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketCommentDto'
      responses:
        '201':
          description: Comment added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketCommentResponseDto'
  /tickets/{id}/activity:
    get:
      summary: List ticket activity
      operationId: listTicketActivity
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Ticket activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketActivityResponseDto'
  /tickets/{id}/body-generation-sessions:
    post:
      summary: Start AI body generation session
      operationId: startTicketBodyGenerationSession
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartBodyGenerationSessionDto'
      responses:
        '200':
          description: AI body generation session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartBodyGenerationSessionResponseDto'
  /tickets/{id}/apply-generated-body:
    post:
      summary: Apply AI-generated ticket body
      operationId: applyTicketGeneratedBody
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyGeneratedBodyDto'
      responses:
        '200':
          description: AI-generated ticket body applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponseDto'
  /tickets/{id}/migrate:
    post:
      summary: Migrate ticket subtree to another workspace
      description: |
        Moves the resolved root ticket and all of its descendant tickets that share the source workspace to
        `targetClientId`. The caller may pass any ticket id in the subtree; the server always migrates the full tree.
        Requires workspace management (see `canManageWorkspaceConfiguration` on clients) on **both** the source and
        target workspaces. Emits `ticketRemoved` for each id on the source workspace room and `ticketUpsert` on the
        target workspace room (tickets Socket.IO namespace). `targetClientId` must differ from the ticket workspace (400 otherwise).
      operationId: migrateTicketToWorkspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateTicketDto'
      responses:
        '200':
          description: Migrated root ticket (includes `children` when descendants exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrateTicketResponseDto'
        '400':
          description: Invalid request (e.g. target workspace equals source)
        '403':
          description: Missing workspace access or insufficient workspace role for source or target
        '404':
          description: Ticket not found
  /tickets/{ticketId}/automation:
    get:
      summary: Get ticket automation configuration
      operationId: getTicketAutomation
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Automation row for the ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketAutomationResponseDto'
    patch:
      summary: Update ticket automation configuration
      description: >
        Applies partial updates. Only fields present in the body are considered; unchanged values do not
        persist a new row or emit activity. Activity rows use action types such as AUTOMATION_ELIGIBILITY_CHANGED,
        AUTOMATION_APPROVAL_REQUIREMENT_CHANGED, AUTOMATION_SETTINGS_UPDATED, and AUTOMATION_APPROVAL_INVALIDATED
        only when prior approval was meaningful (requiresApproval was true and approval existed), except that
        turning off the approval requirement alone does not emit AUTOMATION_APPROVAL_INVALIDATED.
      operationId: patchTicketAutomation
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketAutomationDto'
      responses:
        '200':
          description: Updated automation configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketAutomationResponseDto'
  /tickets/{ticketId}/automation/approve:
    post:
      summary: Approve automation run (when requiresApproval is true)
      operationId: approveTicketAutomation
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketAutomationResponseDto'
  /tickets/{ticketId}/automation/unapprove:
    post:
      summary: Revoke automation approval (when requiresApproval is true)
      operationId: unapproveTicketAutomation
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
            format: uuid
      responses:
