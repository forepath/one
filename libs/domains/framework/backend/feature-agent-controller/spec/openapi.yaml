        - baseBranch
        - baseSha
        - startedAt
        - finishedAt
        - updatedAt
        - iterationCount
        - completionMarkerSeen
        - verificationPassed
        - failureCode
        - summary
        - cancelRequestedAt
        - cancelledByUserId
        - cancellationReason
      properties:
        id:
          type: string
          format: uuid
