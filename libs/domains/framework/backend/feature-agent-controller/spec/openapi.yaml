          type: string
        baseSha:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        iterationCount:
          type: integer
        completionMarkerSeen:
          type: boolean
        verificationPassed:
          type: boolean
        failureCode:
          type: string
          description: >
            Present when a run ends unsuccessfully. Includes values such as verify_command_failed,
            commit_failed (git commit after successful verification), push_failed (git push after that commit),
            agent_no_completion_marker, marker_without_verify, agent_provider_error, vcs_dirty_workspace,
            and others defined by the controller.
        summary:
          type: object
          additionalProperties: true
        cancelRequestedAt:
          type: string
          format: date-time
        cancelledByUserId:
          type: string
          format: uuid
