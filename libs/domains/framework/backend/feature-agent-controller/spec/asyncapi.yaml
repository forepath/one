asyncapi: 3.0.0
info:
  title: Agent controller WebSocket (clients + tickets + pages)
  version: 1.0.0
  description: |
    Socket.IO events for the agent-controller WebSocket port: namespace **clients** (proxy to agent-manager)
    and namespace **tickets** (ticket board / automation realtime), plus namespace **pages** for knowledge board realtime.
    See channel `tickets/*` and `pages/*` for board coherence.
    Namespace **clients** also emits controller-originated `ticketAutomationRunChatUpsert` for chat UI timeline
    (see `clients/ticketAutomationRunChatUpsert` and OpenAPI `TicketAutomationRunChatEventDto`), and
    `ticketChatTicketUpsert` with the same payload shape as tickets-board `ticketUpsert` so chat clients can refresh
    ticket fields on automation cards without joining namespace **tickets**.
    For **clients**, all connections require authentication via the `Authorization` header in the handshake
    (same as HTTP API: `Bearer <jwt-token>` or `Bearer <api-key>` / `ApiKey <api-key>`).
    Unauthenticated connections are rejected with connect_error "Unauthorized".
    The `setClient` operation enforces per-client authorization: only users with access to
    the requested client (global admin, client creator, or client_users entry) can set that
    client context. Unauthorized setClient attempts emit an `error` event with message
    "You do not have access to this client".
    HTTP REST endpoints for prototype autonomy, environment variables, and agent CRUD enforce additional
    workspace-manager rules; see OpenAPI spec (ClientResponseDto.canManageWorkspaceConfiguration and 403 descriptions).
servers:
  local:
    host: localhost:8081
    protocol: ws
    description: |
      Socket.IO server (port from env WEBSOCKET_PORT, default 8081). Namespaces: **clients** (WEBSOCKET_NAMESPACE, default "clients")
      **tickets** (TICKETS_WEBSOCKET_NAMESPACE, default "tickets"), and
      **pages** (KNOWLEDGE_WEBSOCKET_NAMESPACE, default "pages") on the same port and CORS (WEBSOCKET_CORS_ORIGIN).
      Pass Authorization header in handshake (or handshake.auth.Authorization for browser WebSockets).
channels:
  clients/setClient:
    address: clients/setClient
    messages:
      setClientCommand:
        $ref: '#/components/messages/SetClient'
    description: |
      Client selects a client context by UUID. Requires authenticated connection.
      The user must have access to the client (global admin, client creator, or client_users entry).
      On success, server emits setClientSuccess. On failure, server emits error with one of:
      - "clientId is required" (400)
      - "Unauthorized" (missing or invalid auth on socket)
      - "You do not have access to this client" (403)
      - "Remote connection failed: ..." (connection to agent-manager failed)
  clients/setClientSuccess:
    address: clients/setClientSuccess
    messages:
      setClientSuccessEvent:
        $ref: '#/components/messages/SetClientSuccess'
    description: Server acknowledges selected client context
  clients/error:
    address: clients/error
    messages:
      errorEvent:
        $ref: '#/components/messages/Error'
    description: |
      Error responses. Common message values:
      - "clientId is required" (setClient missing clientId)
      - "Unauthorized" (socket missing userInfo after auth middleware)
      - "You do not have access to this client" (403 - setClient forbidden)
      - "No client selected. Call setClient first." (forward without setClient)
      - "Remote connection not established" (forward failed)
      - "Remote connection failed: ..." (connection to agent-manager failed)
  clients/forward:
    address: clients/forward
    messages:
      forwardCommand:
        $ref: '#/components/messages/Forward'
    description: |
      Forward an arbitrary event to the selected client's agents namespace. When `agentId` is provided,
      the gateway automatically logs in the agent using stored credentials before forwarding the event.
      To restore chat history for an agent, forward a "login" event with `agentId` (the payload is
      automatically overridden with credentials from the database, triggering login and subsequent
      chat history restoration). Supported events include "chat", "enhanceChat" (prompt improvement;
      payload `{ message, correlationId, model? }`; response `chatEnhanceResult` unicast from
      agent-manager, proxied to this socket only), "generateTicketBody" (ticket body from title;
      payload `{ title, correlationId, model? }`; response `ticketBodyResult` unicast, same envelope
      shape as `chatEnhanceResult`), "fileUpdate", "logout", "createTerminal", "terminalInput",
      "closeTerminal", etc. The remote agent-manager gateway will process the event and may emit
      response events (e.g., "chatMessage", "chatEnhanceResult", "ticketBodyResult",
      "fileUpdateNotification", "terminalCreated", "terminalOutput", "terminalClosed", "containerStats")
      which are automatically forwarded back to the client. The "containerStats" event payload
      (defined in the agent-manager AsyncAPI) includes container status (running/stopped) and, when
      running, container statistics. For autonomous ticket runs, proxied `chat` may include
      `responseMode: "single" | "stream" | "sync"`, `ephemeral: true`, `continue`, and `resumeSessionSuffix`;
      the controller also uses isolated suffixes (e.g. `-ticket-auto-loop`, `-ticket-auto-commit-msg`) for
      implementation turns vs. post-verify conventional-commit subject generation; statistics on the controller
      side record the latter under interaction kind `autonomous_ticket_commit_message`.
      After a successful run, the controller also completes the workflow over HTTP by proxying agent-manager VCS
      `commit` and `push` (see controller OpenAPI under `/clients/{clientId}/agents/{agentId}/vcs/...`).
      agent-manager passes these to `sendMessage` and skips `agent_messages` persistence when `ephemeral` is true.
      When `ephemeral` is true, chatMessage / chatEvent traffic for that turn is emitted only to the requesting
      socket (not broadcast to other viewers on the same agent).
      After a successful **login** (explicit `forward` with `event: "login"` or first-time auto-login before another event),
      the controller may emit **ticketAutomationRunChatUpsert** (unicast) to hydrate ticket automation runs for that
      `clientId` + `agentId` into the chat timeline (see `clients/ticketAutomationRunChatUpsert`). Live run updates use
      the same event broadcast to room `client:{clientId}` on the **clients** namespace.
      When a ticket row is created or updated (REST or internal), the controller also emits **ticketChatTicketUpsert**
      to room `client:{clientId}` on **clients** (same body as `tickets/ticketUpsert`).
  clients/ticketAutomationRunChatUpsert:
    address: clients/ticketAutomationRunChatUpsert
    messages:
      ticketAutomationRunChatUpsertEvent:
        $ref: '#/components/messages/TicketAutomationRunChatEvent'
    description: |
      Controller-originated ticket automation snapshot for the chat UI (namespace **clients** only; not forwarded from
      agent-manager). Aligns with OpenAPI schema `TicketAutomationRunChatEventDto`. Hydration uses `timelineAt` from
      `run.startedAt`; live updates use `run.updatedAt`.
  clients/ticketChatTicketUpsert:
    address: clients/ticketChatTicketUpsert
    messages:
      ticketChatTicketUpsertEvent:
        $ref: '#/components/messages/TicketBoardTicketPayload'
    description: |
      Full `TicketResponseDto` snapshot on namespace **clients** (room `client:{clientId}`), emitted whenever the
      controller would emit `ticketUpsert` on namespace **tickets**, so manager/chat UIs can merge ticket metadata
      without a `/tickets` socket connection.
  clients/forwardAck:
    address: clients/forwardAck
    messages:
      forwardAckEvent:
        $ref: '#/components/messages/ForwardAck'
    description: Acknowledgement for forwarded events
  clients/remoteDisconnected:
    address: clients/remoteDisconnected
    messages:
      remoteDisconnectedEvent:
        $ref: '#/components/messages/RemoteDisconnected'
    description: Server notifies client that the remote connection to agent-manager has been lost
  clients/remoteReconnecting:
    address: clients/remoteReconnecting
    messages:
      remoteReconnectingEvent:
        $ref: '#/components/messages/RemoteReconnecting'
    description: Server notifies client that reconnection to agent-manager is in progress
  clients/remoteReconnected:
    address: clients/remoteReconnected
    messages:
      remoteReconnectedEvent:
        $ref: '#/components/messages/RemoteReconnected'
    description: Server notifies client that reconnection to agent-manager was successful
  clients/remoteReconnectError:
    address: clients/remoteReconnectError
    messages:
      remoteReconnectErrorEvent:
        $ref: '#/components/messages/RemoteReconnectError'
    description: Server notifies client that a reconnection attempt to agent-manager failed (but will retry)
  clients/remoteReconnectFailed:
    address: clients/remoteReconnectFailed
    messages:
      remoteReconnectFailedEvent:
        $ref: '#/components/messages/RemoteReconnectFailed'
    description: Server notifies client that all reconnection attempts to agent-manager have failed
  tickets/setClient:
    address: tickets/setClient
    messages:
      ticketsSetClientCommand:
        $ref: '#/components/messages/SetClient'
    description: |
      Select workspace for ticket board realtime (Socket.IO namespace "tickets"). Same auth and `ensureClientAccess`
      rules as `clients/setClient`. Joins room `client:{clientId}`; server emits only to sockets in that room.
  tickets/setClientSuccess:
    address: tickets/setClientSuccess
    messages:
      ticketsSetClientSuccessEvent:
        $ref: '#/components/messages/SetClientSuccess'
    description: Acknowledgement after tickets namespace setClient
  tickets/error:
    address: tickets/error
    messages:
      ticketsErrorEvent:
        $ref: '#/components/messages/TicketsBoardError'
    description: |
      Errors for tickets namespace (e.g. missing clientId, Unauthorized, forbidden client, or "Unable to set client context").
  tickets/ticketUpsert:
    address: tickets/ticketUpsert
    messages:
      ticketUpsertEvent:
        $ref: '#/components/messages/TicketBoardTicketPayload'
    description: |
      Full ticket row after create/update (aligns with OpenAPI TicketResponseDto).
      A single REST create with `creationTemplate: specification` emits one upsert per ticket (parent plus four subtasks).
      `POST /tickets/{id}/migrate` emits one `ticketRemoved` per id on the source workspace, then one `ticketUpsert` per migrated row on the target workspace.
  tickets/ticketRemoved:
    address: tickets/ticketRemoved
    messages:
      ticketRemovedEvent:
        $ref: '#/components/messages/TicketBoardTicketRemoved'
    description: Ticket deleted or removed from a workspace list (e.g. workspace move from old client)
  tickets/ticketCommentCreated:
    address: tickets/ticketCommentCreated
    messages:
      ticketCommentCreatedEvent:
        $ref: '#/components/messages/TicketBoardCommentPayload'
    description: New comment on a ticket
  tickets/ticketActivityCreated:
    address: tickets/ticketActivityCreated
    messages:
      ticketActivityCreatedEvent:
        $ref: '#/components/messages/TicketBoardActivityPayload'
    description: New activity row (audit trail); aligns with OpenAPI TicketActivityResponseDto
  tickets/ticketAutomationUpsert:
    address: tickets/ticketAutomationUpsert
    messages:
      ticketAutomationUpsertEvent:
        $ref: '#/components/messages/TicketBoardAutomationPayload'
    description: Automation settings row; aligns with OpenAPI ticket automation response
  tickets/ticketAutomationRunUpsert:
    address: tickets/ticketAutomationRunUpsert
    messages:
      ticketAutomationRunUpsertEvent:
        $ref: '#/components/messages/TicketBoardRunPayload'
    description: |
      Automation run summary (may omit `steps`). During agent iterations, emissions may be throttled (about 1s per run)
      in addition to `ticketAutomationRunStepAppended` for each step.
  tickets/ticketAutomationRunStepAppended:
    address: tickets/ticketAutomationRunStepAppended
    messages:
      ticketAutomationRunStepAppendedEvent:
        $ref: '#/components/messages/TicketBoardRunStepPayload'
    description: New run step row (e.g. agent_turn iteration)
  pages/setClient:
    address: pages/setClient
    messages:
      pagesSetClientCommand:
        $ref: '#/components/messages/SetClient'
    description: |
      Select workspace for knowledge board realtime (Socket.IO namespace "pages"). Same auth and `ensureClientAccess`
      rules as `clients/setClient`. Joins room `client:{clientId}`; server emits only to sockets in that room.
  pages/setClientSuccess:
    address: pages/setClientSuccess
    messages:
      pagesSetClientSuccessEvent:
        $ref: '#/components/messages/SetClientSuccess'
    description: Acknowledgement after pages namespace setClient
  pages/error:
    address: pages/error
    messages:
      pagesErrorEvent:
        $ref: '#/components/messages/TicketsBoardError'
    description: |
      Errors for pages namespace (e.g. missing clientId, Unauthorized, forbidden client, or "Unable to set client context").
  pages/knowledgeTreeChanged:
    address: pages/knowledgeTreeChanged
    messages:
      pagesKnowledgeTreeChangedEvent:
        $ref: '#/components/messages/KnowledgeBoardTreeChangedPayload'
    description: Workspace-scoped signal to refresh the knowledge tree from REST.
  pages/knowledgeRelationChanged:
    address: pages/knowledgeRelationChanged
    messages:
      pagesKnowledgeRelationChangedEvent:
        $ref: '#/components/messages/KnowledgeBoardRelationChangedPayload'
    description: Workspace-scoped signal to refresh affected relations from REST.
  pages/knowledgePageActivityCreated:
    address: pages/knowledgePageActivityCreated
    messages:
      pagesKnowledgePageActivityCreatedEvent:
        $ref: '#/components/messages/KnowledgePageActivityCreatedPayload'
    description: Incremental page activity row for currently open page details.
  status/statusSnapshot:
    address: status/statusSnapshot
    description: |
      Full per-user notification state on connect (git dirty + unread per environment, client rollups, spacesHasAttention).
      Unicast to the connecting socket only. Namespace **status** (STATUS_WEBSOCKET_NAMESPACE, default "status").
  status/statusPatch:
    address: status/statusPatch
    description: Incremental notification deltas after connect (unicast).
  status/markEnvironmentRead:
    address: status/markEnvironmentRead
    description: Client marks an environment chat as read; persists user_environment_read_state.
  status/setActiveEnvironment:
    address: status/setActiveEnvironment
    description: Client reports the environment currently in view (suppresses unread for active user).
operations:
  clientSendsSetClient:
    action: send
    channel:
      $ref: '#/channels/clients~1setClient'
    messages:
      - $ref: '#/channels/clients~1setClient/messages/setClientCommand'
  serverEmitsSetClientSuccess:
    action: receive
    channel:
      $ref: '#/channels/clients~1setClientSuccess'
    messages:
      - $ref: '#/channels/clients~1setClientSuccess/messages/setClientSuccessEvent'
  clientForwardsEvent:
    action: send
    channel:
      $ref: '#/channels/clients~1forward'
    messages:
      - $ref: '#/channels/clients~1forward/messages/forwardCommand'
  serverEmitsForwardAck:
    action: receive
    channel:
      $ref: '#/channels/clients~1forwardAck'
    messages:
      - $ref: '#/channels/clients~1forwardAck/messages/forwardAckEvent'
  serverEmitsError:
    action: receive
    channel:
      $ref: '#/channels/clients~1error'
    messages:
      - $ref: '#/channels/clients~1error/messages/errorEvent'
  serverEmitsRemoteDisconnected:
    action: receive
    channel:
      $ref: '#/channels/clients~1remoteDisconnected'
    messages:
      - $ref: '#/channels/clients~1remoteDisconnected/messages/remoteDisconnectedEvent'
  serverEmitsRemoteReconnecting:
    action: receive
    channel:
      $ref: '#/channels/clients~1remoteReconnecting'
    messages:
      - $ref: '#/channels/clients~1remoteReconnecting/messages/remoteReconnectingEvent'
  serverEmitsRemoteReconnected:
    action: receive
    channel:
      $ref: '#/channels/clients~1remoteReconnected'
    messages:
      - $ref: '#/channels/clients~1remoteReconnected/messages/remoteReconnectedEvent'
  serverEmitsRemoteReconnectError:
    action: receive
    channel:
      $ref: '#/channels/clients~1remoteReconnectError'
    messages:
      - $ref: '#/channels/clients~1remoteReconnectError/messages/remoteReconnectErrorEvent'
  serverEmitsRemoteReconnectFailed:
    action: receive
    channel:
      $ref: '#/channels/clients~1remoteReconnectFailed'
    messages:
      - $ref: '#/channels/clients~1remoteReconnectFailed/messages/remoteReconnectFailedEvent'
  serverEmitsTicketAutomationRunChatUpsert:
    action: receive
    channel:
      $ref: '#/channels/clients~1ticketAutomationRunChatUpsert'
    messages:
      - $ref: '#/channels/clients~1ticketAutomationRunChatUpsert/messages/ticketAutomationRunChatUpsertEvent'
  serverEmitsTicketChatTicketUpsert:
    action: receive
    channel:
      $ref: '#/channels/clients~1ticketChatTicketUpsert'
    messages:
      - $ref: '#/channels/clients~1ticketChatTicketUpsert/messages/ticketChatTicketUpsertEvent'
  pagesClientSendsSetClient:
    action: send
    channel:
      $ref: '#/channels/pages~1setClient'
    messages:
      - $ref: '#/channels/pages~1setClient/messages/pagesSetClientCommand'
  pagesServerEmitsSetClientSuccess:
    action: receive
    channel:
      $ref: '#/channels/pages~1setClientSuccess'
    messages:
      - $ref: '#/channels/pages~1setClientSuccess/messages/pagesSetClientSuccessEvent'
  pagesServerEmitsKnowledgeTreeChanged:
    action: receive
    channel:
      $ref: '#/channels/pages~1knowledgeTreeChanged'
    messages:
      - $ref: '#/channels/pages~1knowledgeTreeChanged/messages/pagesKnowledgeTreeChangedEvent'
  pagesServerEmitsKnowledgeRelationChanged:
    action: receive
    channel:
      $ref: '#/channels/pages~1knowledgeRelationChanged'
    messages:
      - $ref: '#/channels/pages~1knowledgeRelationChanged/messages/pagesKnowledgeRelationChangedEvent'
  pagesServerEmitsKnowledgePageActivityCreated:
    action: receive
    channel:
      $ref: '#/channels/pages~1knowledgePageActivityCreated'
    messages:
      - $ref: '#/channels/pages~1knowledgePageActivityCreated/messages/pagesKnowledgePageActivityCreatedEvent'
components:
  messages:
    SetClient:
      name: SetClient
      title: Set client context
      contentType: application/json
      payload:
        type: object
        required: [clientId]
        properties:
          clientId:
            type: string
            description: Client UUID (v4)
    SetClientSuccess:
      name: SetClientSuccess
      title: Set client success
      contentType: application/json
      payload:
        type: object
        required: [message, clientId]
        properties:
          message:
            type: string
            description: Acknowledgement message
          clientId:
            type: string
            description: Selected client UUID
    KnowledgeBoardTreeChangedPayload:
      name: KnowledgeBoardTreeChangedPayload
      title: Knowledge tree changed
      contentType: application/json
      payload:
        type: object
        required: [clientId]
        properties:
          clientId:
            type: string
            description: Client UUID (v4)
    KnowledgeBoardRelationChangedPayload:
      name: KnowledgeBoardRelationChangedPayload
      title: Knowledge relation changed
      contentType: application/json
      payload:
        type: object
        required: [clientId, sourceType, sourceId]
        properties:
          clientId:
            type: string
            description: Client UUID (v4)
          sourceType:
            type: string
            enum: [ticket, page]
          sourceId:
            type: string
    KnowledgePageActivityCreatedPayload:
      name: KnowledgePageActivityCreatedPayload
      title: Knowledge page activity created
      contentType: application/json
      payload:
        type: object
        required: [id, pageId, occurredAt, actorType, actionType, payload]
        properties:
          id:
            type: string
          pageId:
            type: string
          occurredAt:
            type: string
            format: date-time
          actorType:
            type: string
            enum: [human, ai, system]
          actorUserId:
            type: string
            nullable: true
          actorEmail:
            type: string
            nullable: true
          actionType:
            type: string
          payload:
            type: object
    Forward:
      name: Forward
      title: Forward an event to agents namespace
      contentType: application/json
      payload:
        type: object
        required: [event]
        properties:
          event:
            type: string
            description: >
              Socket.IO event name (e.g., "chat", "enhanceChat", "generateTicketBody", "fileUpdate", "login", "logout", "createTerminal", "terminalInput", "closeTerminal").
              When event is "login" and agentId is provided, the payload field is optional and ignored -
              credentials are automatically loaded from the database to trigger login and chat history restoration.
              When event is "fileUpdate", the payload should contain {filePath: string} which will be forwarded
              to the agent-manager gateway for broadcasting to all clients authenticated to that agent.
              When event is "createTerminal", the payload should contain {sessionId?: string, shell?: string}.
              When event is "terminalInput", the payload should contain {sessionId: string, data: string}.
              When event is "closeTerminal", the payload should contain {sessionId: string}.
              When event is "enhanceChat", the payload should contain { message: string, correlationId: string, model?: string }.
              When event is "generateTicketBody", the payload should contain { title: string, correlationId: string, model?: string }.
              When event is "chat", the payload may include { message, correlationId?, model?, responseMode?: "single"|"stream"|"sync", ephemeral?: boolean, continue?: boolean, resumeSessionSuffix?: string, contextInjection?: { includeWorkspace?: boolean, environmentIds?: string[], ticketShas?: string[], knowledgeShas?: string[], autoEnrichmentEnabled?: boolean } }.
              Response events forwarded from the agent-manager include "containerStats" (payload has status.running and optional stats).
          agentId:
            type: string
            description: >
              Agent UUID to target; if provided, the gateway will perform automatic login using stored credentials
              before forwarding the event. After successful login, the agents gateway automatically restores chat
              history by emitting chatMessage events. When event is "login", the payload field is always ignored
              and credentials are always loaded from the database, regardless of whether the agent is already logged in.
          payload:
            description: >
              Arbitrary payload forwarded to the agents namespace. Optional when event is "login" with agentId
              (credentials are loaded from database instead).
            default: {}
    ForwardAck:
      name: ForwardAck
      title: Forward acknowledgement
      contentType: application/json
      payload:
        type: object
        required: [received, event]
        properties:
          received:
            type: boolean
          event:
            type: string
    Error:
      name: Error
      title: Error event
      contentType: application/json
      payload:
        type: object
        required: [message]
        properties:
          message:
            type: string
            description: |
              Error message. Possible values include:
              - "clientId is required" (400)
              - "Unauthorized" (401)
              - "You do not have access to this client" (403)
              - "No client selected. Call setClient first."
              - "Remote connection not established"
              - "Remote connection failed: ..."
    RemoteDisconnected:
      name: RemoteDisconnected
      title: Remote connection disconnected
      contentType: application/json
      payload:
        type: object
        required: [clientId]
        properties:
          clientId:
            type: string
            description: Client UUID for which the remote connection was lost
    RemoteReconnecting:
      name: RemoteReconnecting
      title: Remote connection reconnecting
      contentType: application/json
      payload:
        type: object
        required: [clientId, attempt]
        properties:
          clientId:
            type: string
            description: Client UUID for which reconnection is in progress
          attempt:
            type: number
            description: Current reconnection attempt number (1-based)
    RemoteReconnected:
      name: RemoteReconnected
      title: Remote connection reconnected
      contentType: application/json
      payload:
        type: object
        required: [clientId]
        properties:
          clientId:
            type: string
            description: Client UUID for which reconnection was successful
    RemoteReconnectError:
      name: RemoteReconnectError
      title: Remote reconnection attempt error
      contentType: application/json
      payload:
        type: object
        required: [clientId, error]
        properties:
          clientId:
            type: string
            description: Client UUID for which reconnection attempt failed
          error:
            type: string
            description: Error message from the failed reconnection attempt (reconnection will continue)
    RemoteReconnectFailed:
      name: RemoteReconnectFailed
      title: Remote reconnection failed
      contentType: application/json
      payload:
        type: object
        required: [clientId, error]
        properties:
          clientId:
            type: string
            description: Client UUID for which all reconnection attempts have failed
          error:
            type: string
            description: Final error message after all reconnection attempts were exhausted
    TicketsBoardError:
      name: TicketsBoardError
      title: Tickets namespace error
      contentType: application/json
      payload:
        type: object
        required: [message]
        properties:
          message:
            type: string
    TicketBoardTicketPayload:
      name: TicketBoardTicketPayload
      title: Ticket upsert payload
      contentType: application/json
      description: |
        Same shape as OpenAPI `TicketResponseDto` (including `tasks` markdown checkbox counts and optional `children`
        when loaded with descendants).
      payload:
        type: object
        additionalProperties: true
    TicketBoardTicketRemoved:
      name: TicketBoardTicketRemoved
      title: Ticket removed
      contentType: application/json
      payload:
        type: object
        required: [id, clientId]
        properties:
          id:
            type: string
            format: uuid
          clientId:
            type: string
            format: uuid
    TicketBoardCommentPayload:
      name: TicketBoardCommentPayload
      title: Ticket comment created
      contentType: application/json
      description: Same shape as OpenAPI `TicketCommentResponseDto`.
      payload:
        type: object
        additionalProperties: true
    TicketBoardActivityPayload:
      name: TicketBoardActivityPayload
      title: Ticket activity created
      contentType: application/json
      description: Same shape as OpenAPI `TicketActivityResponseDto`.
      payload:
        type: object
        additionalProperties: true
    TicketBoardAutomationPayload:
      name: TicketBoardAutomationPayload
      title: Ticket automation upsert
      contentType: application/json
      description: Same shape as OpenAPI ticket automation settings response.
      payload:
        type: object
        additionalProperties: true
    TicketBoardRunPayload:
      name: TicketBoardRunPayload
      title: Automation run upsert
      contentType: application/json
      description: Same shape as OpenAPI automation run response; `steps` may be omitted on the wire.
      payload:
        type: object
        additionalProperties: true
    TicketBoardRunStepPayload:
      name: TicketBoardRunStepPayload
      title: Automation run step appended
      contentType: application/json
      description: Run id plus step row (OpenAPI automation run step DTO under `step`).
      payload:
        type: object
        required:
          - runId
          - step
        properties:
          runId:
            type: string
            format: uuid
          step:
            type: object
            additionalProperties: true
        additionalProperties: false
    TicketAutomationRunChatEvent:
      name: TicketAutomationRunChatEvent
      title: Ticket automation run in chat timeline
      contentType: application/json
      description: Same shape as OpenAPI `TicketAutomationRunChatEventDto`.
      payload:
        type: object
        required: [timelineAt, hydrate, ticket, run, actions]
        properties:
          timelineAt:
            type: string
            format: date-time
          hydrate:
