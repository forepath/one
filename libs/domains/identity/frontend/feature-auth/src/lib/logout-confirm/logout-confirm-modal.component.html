<div
  class="modal fade"
  tabindex="-1"
  aria-labelledby="identityLogoutConfirmModalLabel"
  aria-hidden="true"
  #modal
  data-bs-backdrop="static"
  data-bs-keyboard="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title h5" id="identityLogoutConfirmModalLabel">
          {{ modalTitle() }}
        </h2>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          i18n-aria-label="@@identityLogoutConfirm-closeAria"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <p>{{ modalMessage() }}</p>
        @if (showLogoutAllSessionsOption()) {
          <div class="form-check mt-3">
            <input
              class="form-check-input"
              type="checkbox"
              id="identityLogoutAllSessions"
              [checked]="logoutAllSessions()"
              (change)="logoutAllSessions.set($any($event.target).checked)"
            />
            <label class="form-check-label" for="identityLogoutAllSessions">
              {{ logoutAllSessionsLabel() }}
            </label>
          </div>
          @if (logoutAllSessions()) {
            <p class="text-warning small mb-0 mt-2">
              {{ logoutAllSessionsHint() }}
            </p>
          }
        }
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-outline-secondary"
          data-bs-dismiss="modal"
          i18n="@@identityLogoutConfirm-cancel"
        >
          Cancel
        </button>
        <button type="button" class="btn btn-primary" (click)="onConfirm()" i18n="@@identityLogoutConfirm-confirm">
          Log out
        </button>
      </div>
    </div>
  </div>
</div>
