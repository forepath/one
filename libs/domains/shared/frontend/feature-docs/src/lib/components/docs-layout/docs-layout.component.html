<div class="docs-layout d-flex flex-column h-100">
  <!-- Header -->
  <header class="docs-header bg-dark text-white d-flex align-items-center justify-content-between gap-2 border-bottom">
    <div class="d-flex align-items-center gap-3">
      <a [routerLink]="getBasePath()" class="brand-icon-container me-2 fs-3 bg-primary p-3">
        <img
          src="assets/images/icon_light.svg"
          i18n-alt="@@featureDocsLayout-brandAlt"
          [attr.alt]="productName"
          class="brand-icon"
        />
      </a>
      <a [routerLink]="getBasePath()" class="text-decoration-none text-white d-none d-md-block">
        <h5 class="mb-0" i18n="@@featureDocsLayout-documentation">Documentation</h5>
      </a>
    </div>
    <div class="d-flex align-items-center gap-2">
      <!-- Language Switcher -->
      <div class="dropdown me-1">
        <button
          class="btn btn-link text-white text-decoration-none p-2 dropdown-toggle"
          type="button"
          id="languageDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false"
          i18n-aria-label="@@featureDocsLayout-languageSwitcherAriaLabel"
          aria-label="Select language"
        >
          <i class="bi bi-globe"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
          @for (locale of localeService.getAvailableLocales(); track locale.code) {
            <li>
              <a
                class="dropdown-item"
                [class.active]="localeService.getCurrentLocale() === locale.code"
                [href]="localeService.getLanguageSwitchUrl(locale.code)"
                >{{ locale.label }}</a
              >
            </li>
          }
        </ul>
      </div>
      <framework-docs-search [searchField]="!isMobile()" />
      <a
        class="nav-link text-white ms-3 d-none d-md-block"
        href="https://github.com/forepath/one"
        target="_blank"
        rel="noopener noreferrer"
        i18n-aria-label="@@featureDocsLayout-githubAriaLabel"
        aria-label="GitHub"
        i18n-title="@@featureDocsLayout-githubTitle"
        title="View on GitHub"
      >
        <i class="bi bi-github fs-5"></i>
      </a>
      <div class="form-check form-switch mx-3 me-3 me-md-4 mb-0">
        <input
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="darkModeToggle"
          [checked]="themeService.isDarkMode()"
          (change)="themeService.toggleTheme()"
        />
        <label
          class="form-check-label text-white"
          for="darkModeToggle"
          i18n-title="@@featureDocsLayout-darkModeTitle"
          title="Toggle dark mode"
        >
          <i
            class="bi"
            [class.bi-moon-fill]="!themeService.isDarkMode()"
            [class.bi-sun-fill]="themeService.isDarkMode()"
          ></i>
        </label>
      </div>
      <button
        type="button"
        class="btn btn-link d-md-none text-white menu-collapse-button"
        (click)="toggleMobileMenu()"
        i18n-aria-label="@@featureDocsLayout-toggleNavAriaLabel"
        aria-label="Toggle navigation"
      >
        <i class="bi bi-list fs-4"></i>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="docs-main flex-grow-1 d-flex overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside class="docs-sidebar border-end" [class.mobile-open]="mobileMenuOpen()">
      <div class="docs-sidebar-content">
        <framework-docs-navigation [navigationNodes]="navigationNodes()!" />
      </div>
      @if (mobileMenuOpen()) {
        <div class="docs-sidebar-overlay" (click)="closeMobileMenu()"></div>
      }
    </aside>

    <!-- Content Area -->
    <div class="docs-content-area-container overflow-auto flex-grow-1 h-100">
      <main class="docs-content-area">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
