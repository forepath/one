services:
  frontend-agent-console-server:
    image: ghcr.io/forepath/agenstra-console-server:latest
    pull_policy: never
    container_name: agent-console-server
    environment:
      # Frontend server configuration
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-4200}
      NODE_ENV: ${NODE_ENV:-production}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      CSP_ENFORCE: ${CSP_ENFORCE:-true}
      CSP_CONNECT_SRC_EXTRA: ${CSP_CONNECT_SRC_EXTRA:-http://host.docker.internal:3100}
    ports:
      - '${PORT:-4200}:${PORT:-4200}'
    networks:
      - agent-console-network
    restart: unless-stopped

networks:
  agent-console-network:
    driver: bridge
